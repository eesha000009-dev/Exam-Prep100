<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Indices — Laws & Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>.card{background:#fff;padding:1rem;border-radius:10px;box-shadow:0 10px 30px rgba(2,6,23,0.06)} .mono{font-family:ui-monospace, monospace}</style>
</head>
<body class="bg-teal-50 font-sans">
  <header class="bg-teal-700 text-white py-3 mb-6"><div class="max-w-5xl mx-auto px-4 flex items-center justify-between"><div class="font-semibold">Indices</div><a href="index.html" class="text-white/90">Back</a></div></header>

  <main class="max-w-5xl mx-auto px-4 space-y-6">
    <section class="card"><h2 class="text-lg font-semibold">Laws of Indices</h2><div class="mt-2 text-gray-700">a^m × a^n = a^{m+n}, (a^m)^n = a^{mn}, a^{-n} = 1/a^n, a^{1/2} = √a.</div></section>

    <section class="card">
      <h2 class="text-lg font-semibold">Visual</h2>
      <div class="mt-3 text-sm text-gray-700">Powers grow/shrink rapidly; example: 2^0,2^1,2^2,...</div>
      <div class="mt-4 flex justify-center">
        <svg width="360" height="60" xmlns="http://www.w3.org/2000/svg">
          <text x="10" y="20" font-size="12">2^0=1</text>
          <text x="60" y="20" font-size="12">2^1=2</text>
          <text x="120" y="20" font-size="12">2^2=4</text>
          <text x="200" y="20" font-size="12">2^3=8</text>
          <text x="260" y="20" font-size="12">2^4=16</text>
        </svg>
      </div>
    </section>

    <section class="card">
      <h2 class="text-lg font-semibold">Practice</h2>
      <div class="grid md:grid-cols-2 gap-4 mt-3">
        <div class="p-3 bg-gray-50 rounded"><div class="font-medium">1) (2^3)^2 = ?</div><input id="i1" class="mt-2 p-2 border rounded w-full" placeholder="e.g., 64"><div class="mt-2 flex gap-2"><button id="ic1" class="px-3 py-1 bg-teal-700 text-white rounded">Check</button><button id="ih1" class="px-3 py-1 border rounded">Hint</button></div><div id="ifb1" class="mt-2 text-sm"></div></div>

        <div class="p-3 bg-gray-50 rounded"><div class="font-medium">2) x^{-1/2} = ? (radical form)</div><input id="i2" class="mt-2 p-2 border rounded w-full" placeholder="e.g., 1/√x"><div class="mt-2 flex gap-2"><button id="ic2" class="px-3 py-1 bg-teal-700 text-white rounded">Check</button><button id="ih2" class="px-3 py-1 border rounded">Hint</button></div><div id="ifb2" class="mt-2 text-sm"></div></div>
      </div>
    </section>

    <div class="text-right"><button id="iQuiz" class="bg-teal-700 text-white px-4 py-2 rounded">Quiz</button></div>
  </main>

  <div id="iModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-center justify-center"><div class="bg-white rounded p-6 max-w-md w-full"><div id="iContent"></div><div class="mt-4 text-right"><button id="iClose" class="px-3 py-1 border rounded">Close</button></div></div></div>

  <script>
    function norm(s){return (s||'').toString().trim().replace(/[^0-9a-zA-Z\/\.\-\s\u221A]/g,'');}
    document.getElementById('ic1').addEventListener('click', ()=>{ const v=parseFloat(norm(document.getElementById('i1').value)); const fb=document.getElementById('ifb1'); if(Math.abs(v-64)<0.01) fb.innerHTML='<span style="color:#16a34a">Correct — 64</span>'; else fb.innerHTML='<span style="color:#e11d48">Try again — (2^3)^2 = 2^{6}</span>'; });
    document.getElementById('ih1').addEventListener('click', ()=> alert('Hint: (a^m)^n = a^{mn}'));
    document.getElementById('ic2').addEventListener('click', ()=>{ const v=(document.getElementById('i2').value||'').trim(); const fb=document.getElementById('ifb2'); if(['1/√x','1/sqrt(x)','x^(-1/2)'].includes(v)) fb.innerHTML='<span style="color:#16a34a">Correct — 1/√x</span>'; else fb.innerHTML='<span style="color:#e11d48">Try again — negative fractional power = reciprocal root</span>'; });
    document.getElementById('ih2').addEventListener('click', ()=> alert('Hint: x^{-1/2} = 1/(x^{1/2}) = 1/√x'));

    const pool=[{q:'Simplify: a^2 × a^3 = ?', a:['a^5','a5']},{q:'What is a^{-1}?', a:['1/a','1 ÷ a']}];
    function show(){ let i=0,score=0; const modal=document.getElementById('iModal'); const content=document.getElementById('iContent'); modal.classList.remove('hidden'); function next(){ if(i>=pool.length){ content.innerHTML=`<div class="font-bold">Done</div><div>Score: ${score}/${pool.length}</div>`; return; } const cur=pool[i]; content.innerHTML=`<div class="font-semibold">${cur.q}</div><input id="qa" class="mt-3 p-2 border rounded w-full"><div class="mt-3"><button id="subq" class="px-3 py-1 bg-teal-700 text-white rounded">Submit</button></div><div id="qfb" class="mt-2"></div>`; document.getElementById('subq').onclick=()=>{ const a=(document.getElementById('qa').value||'').trim(); if(cur.a.some(x=>x.replace(/\s/g,'').toLowerCase()===a.replace(/\s/g,'').toLowerCase())){ score++; document.getElementById('qfb').innerHTML='<span style="color:#16a34a">Correct</span>'; } else document.getElementById('qfb').innerHTML=`<span style="color:#e11d48">Wrong — answer ${cur.a[0]}</span>`; i++; setTimeout(next,700); }; }
    next(); }
    document.getElementById('iQuiz').addEventListener('click', show);
    document.getElementById('iClose').addEventListener('click', ()=> document.getElementById('iModal').classList.add('hidden'));
  </script>
<!-- Topic Quiz System -->
<script src="/js/topic-quiz-loader.js"></script>
<script src="/js/topic-quiz-injector.js"></script>
</body>
</html>
