<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodic Table Overview - Learning Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }
        .step-progress { transition: width 0.3s ease-in-out; }
        .resource-card { transition: transform 0.2s; }
        .resource-card:hover { transform: translateY(-4px); }
        .step-button.active { background-color: #FEF3C7; color: #D97706; border-color: #F59E0B; }
        
        /* Mobile sidebar */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 40;
        }
        .sidebar-overlay.show { display: block; }

        /* Simulation container */
        .simulation-container {
            position: relative;
            width: 100%;
            height: 600px;
            overflow: hidden;
            border-radius: 8px;
            background: #f9fafb;
        }
        .simulation-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Video container */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #f9fafb;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Intro text styling */
        .intro-text {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-left: 4px solid #f59e0b;
            padding: 1rem 1.25rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 1.5rem;
        }
        .intro-text p {
            color: #92400e;
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Continue button */
        .continue-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);
        }
        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.5);
        }

        /* Section card */
        .section-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
        }

        /* Click hint */
        .click-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #9ca3af;
            font-size: 0.875rem;
            font-weight: 400;
            cursor: pointer;
            margin-top: 16px;
        }

        /* Content area cursor */
        #stepContainer.clickable {
            cursor: pointer;
        }

        /* Periodic table mini grid */
        .periodic-mini {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 2px;
            font-size: 8px;
        }
        .periodic-mini .element {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            font-weight: 600;
        }
        .periodic-mini .metal { background: #93c5fd; }
        .periodic-mini .nonmetal { background: #86efac; }
        .periodic-mini .metalloid { background: #fde68a; }
        .periodic-mini .noble { background: #c4b5fd; }
        .periodic-mini .empty { background: transparent; }

        @media (max-width: 768px) {
            .desktop-sidebar { display: none; }
            .mobile-sidebar {
                position: fixed;
                top: 0; left: -280px;
                width: 280px;
                height: 100%;
                background: white;
                z-index: 50;
                transition: left 0.3s ease;
                overflow-y: auto;
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            }
            .mobile-sidebar.show { left: 0; }
            .simulation-container { height: 350px; }
            
            .intro-text {
                padding: 0.875rem 1rem;
                margin-bottom: 1rem;
            }
            .intro-text p {
                font-size: 0.9375rem;
            }
            
            .section-card {
                padding: 1rem;
                margin-bottom: 1rem;
            }
        }

        @media (max-width: 480px) {
            .simulation-container { height: 280px; }
            
            .intro-text {
                padding: 0.75rem;
                margin-bottom: 0.75rem;
            }
            .intro-text p {
                font-size: 0.875rem;
            }
            
            .section-card {
                padding: 0.875rem;
                margin-bottom: 0.875rem;
            }
        }
    </style>
</head>

        </div>

        let stepsCompleted = [];

                                    <p class="text-gray-700 leading-relaxed mb-4">The <strong class="text-amber-600">Periodic Table</strong> is a systematic arrangement of all known chemical elements in order of their atomic numbers. It was developed by <strong>Dmitri Mendeleev</strong> in 1869, who noticed patterns in the properties of elements.</p>

                                        <p class="text-amber-800"><i class="fas fa-lightbulb mr-2"></i><strong>Key Insight:</strong> Elements in the same column (group) have similar chemical properties because they have the same number of valence electrons!</p>
                                    </div>
                                </div>
                            `

                                            <ul class="text-gray-700 text-sm space-y-1">

                                                <li>• Elements in same period have same number of electron shells</li>

                                        </div>
                                        <div class="bg-green-50 p-4 rounded-lg border-l-4 border-green-500">

                                            <ul class="text-gray-700 text-sm space-y-1">
                                                <li>• <strong>18 groups</strong> numbered 1-18</li>

                        {

                                <div class="section-card">
                                    <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">

                                    <div class="space-y-4">

                                            <div class="flex items-center mb-2">

        // Initialize the learning system
        function init() {
            // Build steps list
            buildStepsList();
            
            // Load first step
            loadStep(0);
            
            // Setup event listeners
            setupEventListeners();
        }

        function buildStepsList() {
            const stepsList = document.getElementById('stepsList');
            const mobileStepsList = document.getElementById('mobileStepsList');
            
            let html = '';
            topicData.steps.forEach((step, index) => {
                html += `
                    <li>
                        <button class="step-button w-full text-left px-3 py-2 rounded-lg text-sm border transition-all ${index === 0 ? 'active' : 'border-transparent hover:bg-gray-50'}" 
                                data-step="${index}">
                            <span class="inline-block w-6 h-6 rounded-full bg-gray-200 text-center text-xs leading-6 mr-2">${index + 1}</span>
                            ${step.title}
                        </button>
                    </li>
                `;
            });
            
            stepsList.innerHTML = html;
            mobileStepsList.innerHTML = html;
        }

        function loadStep(stepIndex) {
            currentStepIndex = stepIndex;
            currentChunkIndex = 0;
            
            const step = topicData.steps[stepIndex];
            const container = document.getElementById('stepContainer');
            
            // Update active state in sidebar
            document.querySelectorAll('.step-button').forEach((btn, idx) => {
                if (idx === stepIndex) {
                    btn.classList.add('active', 'border-amber-300');
                } else {
                    btn.classList.remove('active', 'border-amber-300');
                }
            });
            
            // Load first chunk
            loadChunk(stepIndex, 0);
            
            // Update navigation buttons
            document.getElementById('prevStepBtn').disabled = stepIndex === 0;
            
            const nextBtn = document.getElementById('nextStepBtn');
            if (stepIndex === topicData.steps.length - 1) {
                nextBtn.innerHTML = 'Complete <i class="fas fa-check ml-2"></i>';
            } else {
                nextBtn.innerHTML = 'Continue <i class="fas fa-chevron-right ml-2"></i>';
            }
            
            // Update progress
            updateProgress();
            
            // Load resources
            loadResources(step);
            
            // Track section viewed
            if (topicTracker && step.id) {
                topicTracker.markSectionViewed(step.id);
            }
        }

        function loadChunk(stepIndex, chunkIndex) {
            const step = topicData.steps[stepIndex];
            const chunk = step.chunks[chunkIndex];
            const container = document.getElementById('stepContainer');
            
            let html = '';
            
            // Add intro text
            if (chunk.intro) {
                html += `<div class="intro-text animate-fade-in-up"><p>${chunk.intro}</p></div>`;
            }
            
            // Add content
            html += chunk.content;
            
            // Add click hint if there are more chunks
            if (chunkIndex < step.chunks.length - 1) {
                html += `
                    <div class="click-hint" onclick="nextChunk()">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                        <span>Click to continue</span>
                    </div>
                `;
                container.classList.add('clickable');
                container.onclick = nextChunk;
            } else {
                container.classList.remove('clickable');
                container.onclick = null;
            }
            
            container.innerHTML = html;
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextChunk() {
            const step = topicData.steps[currentStepIndex];
            if (currentChunkIndex < step.chunks.length - 1) {
                currentChunkIndex++;
                loadChunk(currentStepIndex, currentChunkIndex);
            }
        }

        function loadResources(step) {
            const grid = document.getElementById('resourcesGrid');
            const container = document.getElementById('resourcesContainer');
            
            if (!step.resources || step.resources.length === 0) {
                container.classList.add('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            
            let html = '';
            step.resources.forEach(resource => {
                const icon = resource.type === 'video' ? 'fa-play-circle' : 'fa-flask';
                const color = resource.type === 'video' ? 'text-red-500' : 'text-blue-500';
                
                html += `
                    <div class="resource-card bg-gray-50 p-4 rounded-lg border cursor-pointer" onclick="openResource('${resource.type}', '${resource.url}', '${resource.title}')">
                        <div class="flex items-center mb-2">
                            <i class="fas ${icon} ${color} mr-2"></i>
                            <span class="font-medium text-gray-800">${resource.title}</span>
                        </div>
                        <p class="text-sm text-gray-600">${resource.description}</p>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        function openResource(type, url, title) {
            const modal = document.getElementById('resourceModal');
            const modalTitle = document.getElementById('resourceModalTitle');
            const modalContent = document.getElementById('resourceModalContent');
            
            modalTitle.textContent = title;
            
            if (type === 'video') {
                modalContent.innerHTML = `
                    <div class="video-container">
                        <iframe src="${url}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                `;
            } else {
                modalContent.innerHTML = `
                    <div class="simulation-container" style="height: 500px;">
                        <iframe src="${url}"></iframe>
                    </div>
                `;
            }
            
            modal.classList.remove('hidden');
        }

        function updateProgress() {
            const progress = ((currentStepIndex + 1) / topicData.steps.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('progressPercent').textContent = `${Math.round(progress)}%`;
        }

        function setupEventListeners() {
            // Step buttons
            document.querySelectorAll('.step-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const stepIndex = parseInt(btn.dataset.step);
                    loadStep(stepIndex);
                });
            });
            
            // Navigation buttons
            document.getElementById('prevStepBtn').addEventListener('click', () => {
                if (currentStepIndex > 0) {
                    loadStep(currentStepIndex - 1);
                }
            });
            
            document.getElementById('nextStepBtn').addEventListener('click', () => {
                const step = topicData.steps[currentStepIndex];
                
                // Check if there are more chunks
                if (currentChunkIndex < step.chunks.length - 1) {
                    nextChunk();
                    return;
                }
                
                // Move to next step or complete
                if (currentStepIndex < topicData.steps.length - 1) {
                    loadStep(currentStepIndex + 1);
                } else {
                    // Show quiz
                    if (window.TopicQuizInstance) {
                        window.TopicQuizInstance.start();
                    }
                }
            });
            
            // Resource modal
            document.getElementById('closeResourceModal').addEventListener('click', () => {
                document.getElementById('resourceModal').classList.add('hidden');
            });
            
            document.getElementById('resourceModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    e.currentTarget.classList.add('hidden');
                }
            });
            
            // Mobile menu
            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                document.getElementById('mobileSidebar').classList.add('show');
                document.getElementById('sidebarOverlay').classList.add('show');
            });
            
            document.getElementById('closeSidebarBtn').addEventListener('click', () => {
                document.getElementById('mobileSidebar').classList.remove('show');
                document.getElementById('sidebarOverlay').classList.remove('show');
            });
            
            document.getElementById('sidebarOverlay').addEventListener('click', () => {
                document.getElementById('mobileSidebar').classList.remove('show');
                document.getElementById('sidebarOverlay').classList.remove('show');
            });
            
            // Start Quiz button
            document.getElementById('startQuizBtn')?.addEventListener('click', () => {
                if (window.TopicQuizInstance) {
                    window.TopicQuizInstance.start();
                }
            });
        }

        // Initialize on load
        init();
    </script>
