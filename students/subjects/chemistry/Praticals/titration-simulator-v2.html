<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Titration Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .apparatus {
            width: 100px;
            height: 100px;
            border: 2px solid #ccc;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }

        .apparatus.selected {
            border-color: #2563eb;
            background-color: #dbeafe;
        }

        .apparatus img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .workspace {
            background-color: #8b5e3c;
            min-height: 400px;
            position: relative;
            border-radius: 8px;
        }

        .burette {
            width: 40px;
            height: 300px;
            background: #f0f9ff;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid #93c5fd;
            border-radius: 8px 8px 0 0;
            display: none;
        }

        .burette.placed {
            display: block;
        }

        .burette-liquid {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fcd34d;
            height: 100%;
            transition: height 0.5s;
            border-radius: 6px 6px 0 0;
        }

        .stand {
            width: 200px;
            height: 350px;
            background: #4b5563;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
        }

        .stand.placed {
            display: block;
        }

        .flask {
            width: 120px;
            height: 150px;
            background: transparent;
            border: 2px solid #93c5fd;
            border-radius: 0 0 60px 60px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
        }

        .flask.placed {
            display: block;
        }

        .flask-liquid {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #93c5fd;
            border-radius: 0 0 58px 58px;
            transition: background-color 0.5s;
        }

        .droplet {
            width: 8px;
            height: 8px;
            background: #fcd34d;
            border-radius: 50%;
            position: absolute;
            animation: drop 1s linear;
        }

        @keyframes drop {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(200px);
            }
        }
    </style>
</head>
<body class="bg-gray-100 p-8">

            <!-- Equipment Selection -->

                        <p class="text-center mt-2">Flask</p>
                    </button>
                </div>

                <h2 class="text-xl font-semibold mt-6 mb-4">Solutions</h2>
                <div class="grid grid-cols-2 gap-4">
                    <button class="apparatus" onclick="addSolution('hno3')" data-type="hno3">
                        <div class="h-full bg-yellow-100 flex items-center justify-center">
                            <p class="text-center">HNO₃</p>
                        </div>
                    </button>
                    <button class="apparatus" onclick="addSolution('naoh')" data-type="naoh">
                        <div class="h-full bg-blue-100 flex items-center justify-center">
                            <p class="text-center">NaOH</p>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Workspace -->
            <div class="col-span-2">
                <div class="workspace p-4 rounded-lg">
                    <div class="stand" id="stand"></div>
                    <div class="burette" id="burette">
                        <div class="burette-liquid" id="burette-liquid"></div>
                    </div>
                    <div class="flask" id="flask">
                        <div class="flask-liquid" id="flask-liquid"></div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="bg-white p-4 rounded-lg mt-4">
                    <div class="flex justify-between items-center">
                        <button onclick="addDrop()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                            Add Drop
                        </button>
                        <div class="flex items-center space-x-4">
                            <span>Volume: </span>
                            <span id="volume-reading" class="font-mono">50.00 mL</span>
                        </div>
                        <button onclick="resetExperiment()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                            Reset
                        </button>
                    </div>
                </div>

                <!-- Readings Table -->
                <div class="bg-white p-4 rounded-lg mt-4">
                    <h2 class="text-xl font-semibold mb-4">Readings</h2>
                    <table class="w-full">
                        <thead>
                            <tr>
                                <th class="px-4 py-2">Reading No.</th>
                                <th class="px-4 py-2">Initial (mL)</th>
                                <th class="px-4 py-2">Final (mL)</th>
                                <th class="px-4 py-2">Volume Used (mL)</th>
                            </tr>
                        </thead>
                        <tbody id="readings-table">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let equipment = {
            stand: false,
            burette: false,
            flask: false,
            hno3: false,
            naoh: false
        };

        let currentVolume = 50.00;
        let readings = [];

        function placeEquipment(type) {
            const element = document.getElementById(type);
            
            if (type === 'burette' && !equipment.stand) {
                alert('Please place the stand first');
                return;
            }

            element.classList.add('placed');
            equipment[type] = true;

            // Update status
            checkSetup();
        }

        function addSolution(type) {
            if (!equipment.burette || !equipment.flask) {
                alert('Please set up the apparatus first');
                return;
            }

            if (type === 'hno3') {
                document.getElementById('burette-liquid').style.backgroundColor = '#fcd34d';
                equipment.hno3 = true;
            } else {
                document.getElementById('flask-liquid').style.backgroundColor = '#93c5fd';
                equipment.naoh = true;
            }

            checkSetup();
        }

        function addDrop() {
            if (!isSetupComplete()) {
                alert('Please complete the setup first');
                return;
            }

            currentVolume = Math.max(0, currentVolume - 0.1);
            updateVolumeDisplay();

            // Create droplet animation
            const droplet = document.createElement('div');
            droplet.className = 'droplet';
            droplet.style.left = '50%';
            droplet.style.top = '320px'; // Below burette
            document.querySelector('.workspace').appendChild(droplet);

            // Remove droplet after animation
            setTimeout(() => droplet.remove(), 1000);

            // Change flask color gradually
            if (currentVolume < 25) {
                document.getElementById('flask-liquid').style.backgroundColor = '#34d399';
            }

            if (currentVolume === 0) {
                addReading(50.00, 0.00);
            }
        }

        function updateVolumeDisplay() {
            document.getElementById('volume-reading').textContent = 
                currentVolume.toFixed(2) + ' mL';
        }

        function addReading(initial, final) {
            const volume = initial - final;
            readings.push(volume);
            
            const table = document.getElementById('readings-table');
            const row = table.insertRow();
            row.innerHTML = `
                <td class="px-4 py-2 text-center">${readings.length}</td>
                <td class="px-4 py-2 text-center">${initial.toFixed(2)}</td>
                <td class="px-4 py-2 text-center">${final.toFixed(2)}</td>
                <td class="px-4 py-2 text-center">${volume.toFixed(2)}</td>
            `;
        }

        function resetExperiment() {
            currentVolume = 50.00;
            updateVolumeDisplay();
            document.getElementById('burette-liquid').style.height = '100%';
            document.getElementById('flask-liquid').style.backgroundColor = '#93c5fd';
        }

        function isSetupComplete() {
            return Object.values(equipment).every(v => v);
        }

        function checkSetup() {
            if (isSetupComplete()) {
                document.querySelector('.workspace').classList.add('ready');
            }
        }
    </script>
</body>
</html>
