<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear Physics - Interactive Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        .step-active { background-color: #2563eb; color: white; }
        .step-inactive { background-color: #e5e7eb; color: #374151; }
        #nuclearCanvas { touch-action: none; }
        .particle {
            position: absolute;
            border-radius: 50%;
            transition: transform 0.5s linear;
        }
        .neutron { background-color: #3b82f6; }
        .proton { background-color: #ef4444; }
        .electron { background-color: #10b981; }
        .gamma { background-color: #f59e0b; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-inter">
    <nav class="bg-blue-700 p-4">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="../index.html" class="text-white hover:text-blue-100 flex items-center gap-2">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Physics</span>
            </a>
            <h1 class="text-white text-xl font-bold">Nuclear Physics</h1>
        </div>
    </nav>

    <div class="flex">
        <!-- Sidebar Steps -->
        <aside class="w-64 bg-white shadow-md p-4 min-h-screen">
            <h2 class="text-lg font-semibold mb-4">Learning Steps</h2>
            <ul id="stepsList" class="space-y-2"></ul>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <div id="progressBar" class="mb-6 h-3 bg-gray-200 rounded-full overflow-hidden">
                <div id="progress" class="h-full bg-blue-600 transition-all" style="width: 0%"></div>
            </div>

            <div id="stepContent" class="bg-white rounded-xl shadow-sm p-6 min-h-[300px]"></div>

            <!-- Nuclear Simulation -->
            <div id="simulationContainer" class="mt-6 bg-white rounded-xl shadow-sm p-6">
                <div class="flex gap-4 mb-4">
                    <button id="decayBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                        Radioactive Decay
                    </button>
                    <button id="fissionBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                        Nuclear Fission
                    </button>
                    <button id="fusionBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                        Nuclear Fusion
                    </button>
                </div>

                <div id="nucleusContainer" class="relative w-full h-[400px] border rounded-lg bg-gray-50">
                    <canvas id="nuclearCanvas" class="absolute top-0 left-0 w-full h-full"></canvas>
                    <div id="particleContainer"></div>
                </div>

                <div class="mt-4 grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Initial Nuclei</label>
                        <input type="range" id="nucleiSlider" min="1" max="100" value="50" class="w-full">
                        <span id="nucleiValue" class="text-sm text-gray-600">50 nuclei</span>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Decay Rate</label>
                        <input type="range" id="decayRateSlider" min="1" max="10" value="5" class="w-full">
                        <span id="decayRateValue" class="text-sm text-gray-600">5 per second</span>
                    </div>
                </div>

                <div class="mt-4 grid grid-cols-3 gap-4 text-center">
                    <div class="p-4 bg-blue-50 rounded-lg">
                        <p class="text-sm font-medium text-gray-700">Remaining Nuclei</p>
                        <p id="remainingDisplay" class="text-lg font-bold text-blue-600">50</p>
                    </div>
                    <div class="p-4 bg-green-50 rounded-lg">
                        <p class="text-sm font-medium text-gray-700">Half-life</p>
                        <p id="halfLifeDisplay" class="text-lg font-bold text-green-600">10s</p>
                    </div>
                    <div class="p-4 bg-yellow-50 rounded-lg">
                        <p class="text-sm font-medium text-gray-700">Energy Released</p>
                        <p id="energyDisplay" class="text-lg font-bold text-yellow-600">0 MeV</p>
                    </div>
                </div>
            </div>

            <div class="flex justify-between mt-8">
                <button id="prevBtn" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400" disabled>Previous</button>
                <button id="nextBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Next</button>
            </div>
        </main>
    </div>

    <!-- Quiz Modal -->
    <div id="quizModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-lg w-full">
            <h3 class="text-xl font-bold mb-4">Check Your Understanding</h3>
            <div id="quizContent"></div>
            <div class="mt-6 flex justify-end gap-4">
                <button id="closeQuiz" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">Close</button>
                <button id="submitQuiz" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Submit</button>
            </div>
        </div>
    </div>

    <script>
        const topicData = {
            title: "Nuclear Physics",
            steps: [
                {
                    title: "Atomic Structure",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Basic Nuclear Structure</h3>
                            <div class="space-y-6">
                                <div class="p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold">Subatomic Particles</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Protons: Positive charge, mass = 1.67×10⁻²⁷ kg</li>
                                        <li>Neutrons: No charge, mass ≈ proton mass</li>
                                        <li>Electrons: Negative charge, mass = 9.11×10⁻³¹ kg</li>
                                    </ul>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="p-4 bg-green-50 rounded-lg">
                                        <h4 class="font-semibold">Atomic Number (Z)</h4>
                                        <p>Number of protons</p>
                                        <p class="text-sm text-green-600">Determines element</p>
                                    </div>
                                    <div class="p-4 bg-yellow-50 rounded-lg">
                                        <h4 class="font-semibold">Mass Number (A)</h4>
                                        <p>Protons + Neutrons</p>
                                        <p class="text-sm text-yellow-600">Determines isotope</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `
                },
                {
                    title: "Radioactive Decay",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Types of Decay</h3>
                            <div class="grid grid-cols-3 gap-4">
                                <div class="p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold">Alpha Decay</h4>
                                    <p>Emission of ⁴He nucleus</p>
                                    <p class="text-sm text-blue-600">A→A-4, Z→Z-2</p>
                                </div>
                                <div class="p-4 bg-green-50 rounded-lg">
                                    <h4 class="font-semibold">Beta Decay</h4>
                                    <p>Emission of electron</p>
                                    <p class="text-sm text-green-600">A→A, Z→Z+1</p>
                                </div>
                                <div class="p-4 bg-yellow-50 rounded-lg">
                                    <h4 class="font-semibold">Gamma Decay</h4>
                                    <p>Emission of photon</p>
                                    <p class="text-sm text-yellow-600">No change in A,Z</p>
                                </div>
                            </div>
                            <div class="mt-4 p-4 bg-gray-50 rounded-lg">
                                <p class="font-semibold">Half-life Formula:</p>
                                <p class="text-lg text-center my-2">N(t) = N₀(1/2)^(t/t₁/₂)</p>
                                <p>Where:</p>
                                <ul class="list-disc list-inside">
                                    <li>N(t) = Number of nuclei at time t</li>
                                    <li>N₀ = Initial number of nuclei</li>
                                    <li>t₁/₂ = Half-life</li>
                                </ul>
                            </div>
                        </div>
                    `
                },
                {
                    title: "Nuclear Reactions",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Fission and Fusion</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold">Nuclear Fission</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Heavy nucleus splits</li>
                                        <li>Releases neutrons</li>
                                        <li>Chain reaction possible</li>
                                        <li>Used in nuclear reactors</li>
                                    </ul>
                                </div>
                                <div class="p-4 bg-green-50 rounded-lg">
                                    <h4 class="font-semibold">Nuclear Fusion</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Light nuclei combine</li>
                                        <li>Requires high temperature</li>
                                        <li>Powers stars</li>
                                        <li>Clean energy potential</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="mt-4 p-4 bg-yellow-50 rounded-lg">
                                <h4 class="font-semibold">Mass-Energy Equivalence</h4>
                                <p class="text-lg text-center my-2">E = mc²</p>
                                <p>Energy released in nuclear reactions due to mass defect</p>
                            </div>
                        </div>
                    `
                }
            ],
            quiz: [
                {
                    question: "What is the particle emitted in beta decay?",
                    options: [
                        "Helium nucleus",
                        "Electron",
                        "Photon",
                        "Neutron"
                    ],
                    correct: 1
                },
                {
                    question: "After how many half-lives will 1/8 of the original material remain?",
                    options: ["1", "2", "3", "4"],
                    correct: 2
                },
                {
                    question: "Which process powers the Sun?",
                    options: [
                        "Nuclear fission",
                        "Nuclear fusion",
                        "Alpha decay",
                        "Beta decay"
                    ],
                    correct: 1
                }
            ]
        };

        let currentStep = 0;
        let completedSteps = new Set();
        let currentMode = 'decay';
        let nucleiCount = 50;
        let decayRate = 5;
        let time = 0;
        let particles = [];
        let energy = 0;
        
        const canvas = document.getElementById('nuclearCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = 400;

        class Particle {
            constructor(type, x, y) {
                this.type = type;
                this.x = x;
                this.y = y;
                this.size = type === 'nucleus' ? 20 : 8;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.element = document.createElement('div');
                this.element.className = `particle ${type}`;
                this.element.style.width = this.size + 'px';
                this.element.style.height = this.size + 'px';
                document.getElementById('particleContainer').appendChild(this.element);
                this.updatePosition();
            }

            updatePosition() {
                this.element.style.transform = `translate(${this.x}px, ${this.y}px)`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off walls
                if (this.x < 0 || this.x > canvas.width - this.size) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height - this.size) this.vy *= -1;

                this.updatePosition();
            }

            remove() {
                this.element.remove();
            }
        }

        function initializeNuclei() {
            particles = [];
            document.getElementById('particleContainer').innerHTML = '';
            
            for(let i = 0; i < nucleiCount; i++) {
                const x = Math.random() * (canvas.width - 40);
                const y = Math.random() * (canvas.height - 40);
                particles.push(new Particle('nucleus', x, y));
            }
        }

        function decay() {
            const decayCount = Math.min(Math.floor(Math.random() * decayRate), particles.length);
            
            for(let i = 0; i < decayCount; i++) {
                if(particles.length === 0) break;
                
                const index = Math.floor(Math.random() * particles.length);
                const particle = particles[index];
                
                // Remove nucleus
                particle.remove();
                particles.splice(index, 1);

                // Create decay products
                const x = particle.x;
                const y = particle.y;
                
                // Add energy
                energy += 0.5; // MeV per decay

                // Create decay products based on decay type
                if(Math.random() < 0.33) {
                    // Alpha decay
                    particles.push(new Particle('proton', x, y));
                    particles.push(new Particle('neutron', x + 10, y));
                } else if(Math.random() < 0.66) {
                    // Beta decay
                    particles.push(new Particle('electron', x, y));
                } else {
                    // Gamma decay
                    particles.push(new Particle('gamma', x, y));
                }
            }

            // Update displays
            document.getElementById('remainingDisplay').textContent = particles.length;
            document.getElementById('energyDisplay').textContent = energy.toFixed(1) + ' MeV';
            document.getElementById('halfLifeDisplay').textContent = 
                ((Math.log(2) / decayRate) * nucleiCount).toFixed(1) + 's';
        }

        function fission() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw uranium nucleus
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 30, 0, Math.PI * 2);
            ctx.fillStyle = '#3b82f6';
            ctx.fill();

            // Draw neutron beam
            ctx.beginPath();
            ctx.moveTo(0, canvas.height/2);
            ctx.lineTo(canvas.width/2 - 40, canvas.height/2);
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function fusion() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw hydrogen nuclei
            ctx.beginPath();
            ctx.arc(canvas.width/2 - 20, canvas.height/2, 15, 0, Math.PI * 2);
            ctx.arc(canvas.width/2 + 20, canvas.height/2, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#10b981';
            ctx.fill();
        }

        function updateSimulation() {
            switch(currentMode) {
                case 'decay':
                    decay();
                    particles.forEach(p => p.update());
                    break;
                case 'fission':
                    fission();
                    break;
                case 'fusion':
                    fusion();
                    break;
            }
            requestAnimationFrame(updateSimulation);
        }

        // Event listeners
        document.getElementById('nucleiSlider').addEventListener('input', (e) => {
            nucleiCount = parseInt(e.target.value);
            document.getElementById('nucleiValue').textContent = nucleiCount + ' nuclei';
            if(currentMode === 'decay') initializeNuclei();
        });

        document.getElementById('decayRateSlider').addEventListener('input', (e) => {
            decayRate = parseInt(e.target.value);
            document.getElementById('decayRateValue').textContent = decayRate + ' per second';
        });

        document.getElementById('decayBtn').onclick = () => {
            currentMode = 'decay';
            document.getElementById('decayBtn').className = 'px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700';
            document.getElementById('fissionBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
            document.getElementById('fusionBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
            initializeNuclei();
        };

        document.getElementById('fissionBtn').onclick = () => {
            currentMode = 'fission';
            document.getElementById('fissionBtn').className = 'px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700';
            document.getElementById('decayBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
            document.getElementById('fusionBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
            particles.forEach(p => p.remove());
            particles = [];
        };

        document.getElementById('fusionBtn').onclick = () => {
            currentMode = 'fusion';
            document.getElementById('fusionBtn').className = 'px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700';
            document.getElementById('decayBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
            document.getElementById('fissionBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
            particles.forEach(p => p.remove());
            particles = [];
        };

        function renderSteps() {
            const stepsList = document.getElementById('stepsList');
            stepsList.innerHTML = '';
            topicData.steps.forEach((step, idx) => {
                const li = document.createElement('li');
                li.className = `cursor-pointer p-2 rounded ${idx === currentStep ? 'step-active' : 'step-inactive'}`;
                li.textContent = step.title;
                li.onclick = () => showStep(idx);
                stepsList.appendChild(li);
            });
        }

        function showStep(idx) {
            currentStep = idx;
            document.getElementById('stepContent').innerHTML = topicData.steps[idx].content;
            renderSteps();
            updateProgress();
            document.getElementById('prevBtn').disabled = idx === 0;
            document.getElementById('nextBtn').disabled = idx === topicData.steps.length - 1;
        }

        function updateProgress() {
            const percent = ((completedSteps.size) / topicData.steps.length) * 100;
            document.getElementById('progress').style.width = percent + '%';
        }

        function showQuiz() {
            const quizModal = document.getElementById('quizModal');
            quizModal.classList.remove('hidden');
            
            const quizContent = document.getElementById('quizContent');
            quizContent.innerHTML = topicData.quiz.map((q, idx) => `
                <div class="mb-6">
                    <p class="font-semibold mb-2">${idx + 1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => `
                            <label class="flex items-center">
                                <input type="radio" name="q${idx}" value="${i}" class="mr-2">
                                <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('closeQuiz').onclick = () => {
            document.getElementById('quizModal').classList.add('hidden');
        };

        document.getElementById('submitQuiz').onclick = () => {
            let score = 0;
            topicData.quiz.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                if (selected && parseInt(selected.value) === q.correct) score++;
            });
            
            const percent = (score / topicData.quiz.length) * 100;
            if (percent >= 70) {
                completedSteps.add(currentStep);
                updateProgress();
            }
            
            document.getElementById('quizContent').innerHTML = `
                <div class="text-center">
                    <p class="text-2xl font-bold ${percent >= 70 ? 'text-green-600' : 'text-red-600'}">${score}/${topicData.quiz.length}</p>
                    <p class="mt-2">${percent >= 70 ? 'Great job! You can move on to the next section.' : 'Try again to improve your score.'}</p>
                </div>
            `;
            document.getElementById('submitQuiz').style.display = 'none';
        };

        // Navigation buttons
        document.getElementById('prevBtn').onclick = () => {
            if (currentStep > 0) showStep(currentStep - 1);
        };

        document.getElementById('nextBtn').onclick = () => {
            if (currentStep < topicData.steps.length - 1) {
                showQuiz();
            }
        };

        // Initialize
        window.onload = () => {
            renderSteps();
            showStep(0);
            initializeNuclei();
            updateSimulation();

            // Handle window resize
            window.addEventListener('resize', () => {
                canvas.width = canvas.offsetWidth;
                if(currentMode === 'decay') initializeNuclei();
            });
        };
    </script>
<!-- Topic Quiz System -->
<script src="/js/topic-quiz-loader.js"></script>
<script src="/js/topic-quiz-injector.js"></script>
</body>
</html>
