<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound and Waves - Interactive Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        .step-active { background-color: #2563eb; color: white; }
        .step-inactive { background-color: #e5e7eb; color: #374151; }
        #waveCanvas { touch-action: none; }
        @keyframes vibrate {
            0% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
            100% { transform: translateX(0); }
        }
        .vibrating { animation: vibrate 0.1s infinite; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-inter">
    <nav class="bg-blue-700 p-4">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="../index.html" class="text-white hover:text-blue-100 flex items-center gap-2">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Physics</span>
            </a>
            <h1 class="text-white text-xl font-bold">Sound and Waves</h1>
        </div>
    </nav>

    <div class="flex">
        <!-- Sidebar Steps -->
        <aside class="w-64 bg-white shadow-md p-4 min-h-screen">
            <h2 class="text-lg font-semibold mb-4">Learning Steps</h2>
            <ul id="stepsList" class="space-y-2"></ul>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <div id="progressBar" class="mb-6 h-3 bg-gray-200 rounded-full overflow-hidden">
                <div id="progress" class="h-full bg-blue-600 transition-all" style="width: 0%"></div>
            </div>

            <div id="stepContent" class="bg-white rounded-xl shadow-sm p-6 min-h-[300px]"></div>

            <!-- Wave Simulation -->
            <div id="simulationContainer" class="mt-6 bg-white rounded-xl shadow-sm p-6">
                <div class="flex gap-4 mb-4">
                    <button id="standingWaveBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                        Standing Wave
                    </button>
                    <button id="interferenceBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                        Wave Interference
                    </button>
                    <button id="resonanceBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                        Resonance
                    </button>
                </div>

                <canvas id="waveCanvas" class="w-full border rounded-lg bg-gray-50" height="300"></canvas>
                
                <div class="mt-4 grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Frequency (Hz)</label>
                        <input type="range" id="frequencySlider" min="1" max="10" value="2" class="w-full">
                        <span id="frequencyValue" class="text-sm text-gray-600">2 Hz</span>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Amplitude</label>
                        <input type="range" id="amplitudeSlider" min="10" max="50" value="30" class="w-full">
                        <span id="amplitudeValue" class="text-sm text-gray-600">30 units</span>
                    </div>
                </div>

                <!-- Wave Parameters Display -->
                <div class="mt-4 grid grid-cols-3 gap-4">
                    <div class="p-4 bg-blue-50 rounded-lg text-center">
                        <p class="text-sm font-medium text-gray-700">Wavelength</p>
                        <p id="wavelengthDisplay" class="text-lg font-bold text-blue-600">50 cm</p>
                    </div>
                    <div class="p-4 bg-green-50 rounded-lg text-center">
                        <p class="text-sm font-medium text-gray-700">Period</p>
                        <p id="periodDisplay" class="text-lg font-bold text-green-600">0.5 s</p>
                    </div>
                    <div class="p-4 bg-yellow-50 rounded-lg text-center">
                        <p class="text-sm font-medium text-gray-700">Wave Speed</p>
                        <p id="speedDisplay" class="text-lg font-bold text-yellow-600">100 cm/s</p>
                    </div>
                </div>
            </div>

            <div class="flex justify-between mt-8">
                <button id="prevBtn" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400" disabled>Previous</button>
                <button id="nextBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Next</button>
            </div>
        </main>
    </div>

    <!-- Quiz Modal -->
    <div id="quizModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-lg w-full">
            <h3 class="text-xl font-bold mb-4">Check Your Understanding</h3>
            <div id="quizContent"></div>
            <div class="mt-6 flex justify-end gap-4">
                <button id="closeQuiz" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">Close</button>
                <button id="submitQuiz" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Submit</button>
            </div>
        </div>
    </div>

    <script>
        const topicData = {
            title: "Sound and Waves",
            steps: [
                {
                    title: "Wave Properties",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Basic Wave Properties</h3>
                            <div class="space-y-6">
                                <div class="p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold">Key Terms</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Wavelength (λ): Distance between repeating points</li>
                                        <li>Frequency (f): Oscillations per second</li>
                                        <li>Amplitude (A): Maximum displacement</li>
                                        <li>Period (T): Time for one complete cycle</li>
                                    </ul>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="p-4 bg-green-50 rounded-lg">
                                        <h4 class="font-semibold">Wave Speed</h4>
                                        <p class="text-center my-2">v = λf</p>
                                        <p class="text-sm text-green-600">Speed = Wavelength × Frequency</p>
                                    </div>
                                    <div class="p-4 bg-yellow-50 rounded-lg">
                                        <h4 class="font-semibold">Period & Frequency</h4>
                                        <p class="text-center my-2">T = 1/f</p>
                                        <p class="text-sm text-yellow-600">Period is inverse of frequency</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `
                },
                {
                    title: "Wave Phenomena",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Wave Interactions</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold">Interference</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Constructive: Waves add</li>
                                        <li>Destructive: Waves cancel</li>
                                        <li>Creates patterns</li>
                                    </ul>
                                </div>
                                <div class="p-4 bg-green-50 rounded-lg">
                                    <h4 class="font-semibold">Standing Waves</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Nodes: No motion</li>
                                        <li>Antinodes: Maximum motion</li>
                                        <li>Resonant frequencies</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="mt-4 p-4 bg-yellow-50 rounded-lg">
                                <h4 class="font-semibold">Resonance</h4>
                                <p>When driving frequency matches natural frequency</p>
                                <p class="text-sm text-yellow-600">Examples: Musical instruments, bridges</p>
                            </div>
                        </div>
                    `
                },
                {
                    title: "Sound Waves",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Sound Wave Properties</h3>
                            <div class="space-y-6">
                                <div class="p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold">Characteristics</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Longitudinal waves</li>
                                        <li>Requires medium</li>
                                        <li>Speed depends on medium</li>
                                    </ul>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="p-4 bg-green-50 rounded-lg">
                                        <h4 class="font-semibold">Frequency Range</h4>
                                        <p>Human hearing: 20 Hz - 20 kHz</p>
                                        <p class="text-sm text-green-600">Below: Infrasound</p>
                                        <p class="text-sm text-green-600">Above: Ultrasound</p>
                                    </div>
                                    <div class="p-4 bg-yellow-50 rounded-lg">
                                        <h4 class="font-semibold">Properties</h4>
                                        <ul class="list-disc list-inside">
                                            <li>Pitch (frequency)</li>
                                            <li>Loudness (amplitude)</li>
                                            <li>Quality (waveform)</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `
                }
            ],
            quiz: [
                {
                    question: "What happens to wavelength when frequency increases (speed constant)?",
                    options: [
                        "Increases",
                        "Decreases",
                        "Stays the same",
                        "Becomes zero"
                    ],
                    correct: 1
                },
                {
                    question: "In a standing wave, what is a node?",
                    options: [
                        "Point of maximum amplitude",
                        "Point of zero amplitude",
                        "Point of maximum frequency",
                        "Point of zero frequency"
                    ],
                    correct: 1
                },
                {
                    question: "Which property of a sound wave determines its pitch?",
                    options: [
                        "Amplitude",
                        "Wavelength",
                        "Frequency",
                        "Speed"
                    ],
                    correct: 2
                }
            ]
        };

        let currentStep = 0;
        let completedSteps = new Set();
        let currentMode = 'standing';
        let time = 0;
        let frequency = 2;
        let amplitude = 30;
        
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = 300;

        function drawStandingWave() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerY = canvas.height / 2;
            
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            
            for(let x = 0; x <= canvas.width; x++) {
                const dx = x / canvas.width;
                const y = centerY + amplitude * Math.sin(2 * Math.PI * frequency * dx) * Math.cos(2 * Math.PI * time);
                ctx.lineTo(x, y);
            }

            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw nodes
            for(let i = 0; i <= frequency; i++) {
                const x = (i * canvas.width) / frequency;
                ctx.beginPath();
                ctx.arc(x, centerY, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#ef4444';
                ctx.fill();
            }
        }

        function drawInterference() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerY = canvas.height / 2;
            
            // Wave 1
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            for(let x = 0; x <= canvas.width; x++) {
                const dx = x / canvas.width;
                const y = centerY + (amplitude/2) * Math.sin(2 * Math.PI * (frequency * dx - time));
                ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(37, 99, 235, 0.5)';
            ctx.stroke();

            // Wave 2
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            for(let x = 0; x <= canvas.width; x++) {
                const dx = x / canvas.width;
                const y = centerY + (amplitude/2) * Math.sin(2 * Math.PI * (frequency * dx - time + 0.5));
                ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
            ctx.stroke();

            // Resultant wave
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            for(let x = 0; x <= canvas.width; x++) {
                const dx = x / canvas.width;
                const y1 = (amplitude/2) * Math.sin(2 * Math.PI * (frequency * dx - time));
                const y2 = (amplitude/2) * Math.sin(2 * Math.PI * (frequency * dx - time + 0.5));
                ctx.lineTo(x, centerY + y1 + y2);
            }
            ctx.strokeStyle = '#000';
            ctx.stroke();
        }

        function drawResonance() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerY = canvas.height / 2;
            
            // Draw oscillator
            const oscillatorX = 50;
            const oscillatorY = centerY + amplitude * Math.sin(2 * Math.PI * time * frequency);
            
            ctx.beginPath();
            ctx.arc(oscillatorX, oscillatorY, 10, 0, 2 * Math.PI);
            ctx.fillStyle = '#2563eb';
            ctx.fill();

            // Draw spring
            ctx.beginPath();
            ctx.moveTo(oscillatorX, oscillatorY);
            for(let i = 0; i < 10; i++) {
                const x = oscillatorX + (i * 20);
                const offset = 10 * Math.sin(i * Math.PI);
                const y = oscillatorY + offset;
                ctx.lineTo(x, y);
            }
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function updateWave() {
            time += 0.016; // 60 FPS
            
            switch(currentMode) {
                case 'standing':
                    drawStandingWave();
                    break;
                case 'interference':
                    drawInterference();
                    break;
                case 'resonance':
                    drawResonance();
                    break;
            }

            // Update displays
            const wavelength = 100 / frequency;
            const period = 1 / frequency;
            const speed = wavelength * frequency;

            document.getElementById('wavelengthDisplay').textContent = wavelength.toFixed(1) + ' cm';
            document.getElementById('periodDisplay').textContent = period.toFixed(2) + ' s';
            document.getElementById('speedDisplay').textContent = speed.toFixed(0) + ' cm/s';

            requestAnimationFrame(updateWave);
        }

        // Event listeners for controls
        document.getElementById('frequencySlider').addEventListener('input', (e) => {
            frequency = parseInt(e.target.value);
            document.getElementById('frequencyValue').textContent = frequency + ' Hz';
        });

        document.getElementById('amplitudeSlider').addEventListener('input', (e) => {
            amplitude = parseInt(e.target.value);
            document.getElementById('amplitudeValue').textContent = amplitude + ' units';
        });

        document.getElementById('standingWaveBtn').onclick = () => {
            currentMode = 'standing';
            document.getElementById('standingWaveBtn').className = 'px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700';
            document.getElementById('interferenceBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
            document.getElementById('resonanceBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
        };

        document.getElementById('interferenceBtn').onclick = () => {
            currentMode = 'interference';
            document.getElementById('interferenceBtn').className = 'px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700';
            document.getElementById('standingWaveBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
            document.getElementById('resonanceBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
        };

        document.getElementById('resonanceBtn').onclick = () => {
            currentMode = 'resonance';
            document.getElementById('resonanceBtn').className = 'px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700';
            document.getElementById('standingWaveBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
            document.getElementById('interferenceBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
        };

        function renderSteps() {
            const stepsList = document.getElementById('stepsList');
            stepsList.innerHTML = '';
            topicData.steps.forEach((step, idx) => {
                const li = document.createElement('li');
                li.className = `cursor-pointer p-2 rounded ${idx === currentStep ? 'step-active' : 'step-inactive'}`;
                li.textContent = step.title;
                li.onclick = () => showStep(idx);
                stepsList.appendChild(li);
            });
        }

        function showStep(idx) {
            currentStep = idx;
            document.getElementById('stepContent').innerHTML = topicData.steps[idx].content;
            renderSteps();
            updateProgress();
            document.getElementById('prevBtn').disabled = idx === 0;
            document.getElementById('nextBtn').disabled = idx === topicData.steps.length - 1;
        }

        function updateProgress() {
            const percent = ((completedSteps.size) / topicData.steps.length) * 100;
            document.getElementById('progress').style.width = percent + '%';
        }

        function showQuiz() {
            const quizModal = document.getElementById('quizModal');
            quizModal.classList.remove('hidden');
            
            const quizContent = document.getElementById('quizContent');
            quizContent.innerHTML = topicData.quiz.map((q, idx) => `
                <div class="mb-6">
                    <p class="font-semibold mb-2">${idx + 1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => `
                            <label class="flex items-center">
                                <input type="radio" name="q${idx}" value="${i}" class="mr-2">
                                <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('closeQuiz').onclick = () => {
            document.getElementById('quizModal').classList.add('hidden');
        };

        document.getElementById('submitQuiz').onclick = () => {
            let score = 0;
            topicData.quiz.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                if (selected && parseInt(selected.value) === q.correct) score++;
            });
            
            const percent = (score / topicData.quiz.length) * 100;
            if (percent >= 70) {
                completedSteps.add(currentStep);
                updateProgress();
            }
            
            document.getElementById('quizContent').innerHTML = `
                <div class="text-center">
                    <p class="text-2xl font-bold ${percent >= 70 ? 'text-green-600' : 'text-red-600'}">${score}/${topicData.quiz.length}</p>
                    <p class="mt-2">${percent >= 70 ? 'Great job! You can move on to the next section.' : 'Try again to improve your score.'}</p>
                </div>
            `;
            document.getElementById('submitQuiz').style.display = 'none';
        };

        // Navigation buttons
        document.getElementById('prevBtn').onclick = () => {
            if (currentStep > 0) showStep(currentStep - 1);
        };

        document.getElementById('nextBtn').onclick = () => {
            if (currentStep < topicData.steps.length - 1) {
                showQuiz();
            }
        };

        // Initialize
        window.onload = () => {
            renderSteps();
            showStep(0);
            updateWave();

            // Handle window resize
            window.addEventListener('resize', () => {
                canvas.width = canvas.offsetWidth;
            });
        };
    </script>
</body>
</html>
