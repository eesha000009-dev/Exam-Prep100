<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Circuits - Interactive Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        .step-active { background-color: #2563eb; color: white; }
        .step-inactive { background-color: #e5e7eb; color: #374151; }
        #circuitCanvas { touch-action: none; }
        .electron { 
            width: 6px;
            height: 6px;
            background-color: #3b82f6;
            border-radius: 50%;
            position: absolute;
            transition: transform 0.1s linear;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-inter">
    <nav class="bg-blue-700 p-4">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="../index.html" class="text-white hover:text-blue-100 flex items-center gap-2">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Physics</span>
            </a>
            <h1 class="text-white text-xl font-bold">Electric Circuits</h1>
        </div>
    </nav>

    <div class="flex">
        <!-- Sidebar Steps -->
        <aside class="w-64 bg-white shadow-md p-4 min-h-screen">
            <h2 class="text-lg font-semibold mb-4">Learning Steps</h2>
            <ul id="stepsList" class="space-y-2"></ul>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <div id="progressBar" class="mb-6 h-3 bg-gray-200 rounded-full overflow-hidden">
                <div id="progress" class="h-full bg-blue-600 transition-all" style="width: 0%"></div>
            </div>

            <div id="stepContent" class="bg-white rounded-xl shadow-sm p-6 min-h-[300px]"></div>

            <!-- Circuit Simulation -->
            <div id="simulationContainer" class="mt-6 bg-white rounded-xl shadow-sm p-6">
                <h3 class="text-lg font-semibold mb-4">Interactive Circuit Simulation</h3>
                <div id="circuitContainer" class="relative w-full h-[300px] border rounded-lg bg-gray-50">
                    <canvas id="circuitCanvas" class="absolute top-0 left-0 w-full h-full"></canvas>
                    <div id="electrons"></div>
                </div>
                <div class="mt-4 grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Voltage (V)</label>
                        <input type="range" id="voltageSlider" min="0" max="12" value="6" class="w-full">
                        <span id="voltageValue" class="text-sm text-gray-600">6 V</span>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Resistance (Ω)</label>
                        <input type="range" id="resistanceSlider" min="1" max="20" value="10" class="w-full">
                        <span id="resistanceValue" class="text-sm text-gray-600">10 Ω</span>
                    </div>
                </div>
                <div class="mt-4 p-4 bg-blue-50 rounded-lg">
                    <div class="grid grid-cols-3 gap-4 text-center">
                        <div>
                            <p class="text-sm font-medium text-gray-700">Voltage</p>
                            <p id="voltageDisplay" class="text-lg font-bold text-blue-600">6 V</p>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-700">Current</p>
                            <p id="currentDisplay" class="text-lg font-bold text-blue-600">0.6 A</p>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-700">Power</p>
                            <p id="powerDisplay" class="text-lg font-bold text-blue-600">3.6 W</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-between mt-8">
                <button id="prevBtn" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400" disabled>Previous</button>
                <button id="nextBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Next</button>
            </div>
        </main>
    </div>

    <!-- Quiz Modal -->
    <div id="quizModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-lg w-full">
            <h3 class="text-xl font-bold mb-4">Check Your Understanding</h3>
            <div id="quizContent"></div>
            <div class="mt-6 flex justify-end gap-4">
                <button id="closeQuiz" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">Close</button>
                <button id="submitQuiz" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Submit</button>
            </div>
        </div>
    </div>

    <script>
        const topicData = {
            title: "Electric Circuits",
            steps: [
                {
                    title: "Basic Concepts",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Understanding Electric Circuits</h3>
                            <div class="space-y-6">
                                <div class="p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold">Components</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Battery/Power Source</li>
                                        <li>Conductors (Wires)</li>
                                        <li>Resistors</li>
                                        <li>Switches</li>
                                    </ul>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="p-4 bg-green-50 rounded-lg">
                                        <h4 class="font-semibold">Voltage (V)</h4>
                                        <p>The electric potential difference between two points</p>
                                        <p class="text-sm text-green-600">Unit: Volts (V)</p>
                                    </div>
                                    <div class="p-4 bg-yellow-50 rounded-lg">
                                        <h4 class="font-semibold">Current (I)</h4>
                                        <p>The flow of electric charge</p>
                                        <p class="text-sm text-yellow-600">Unit: Amperes (A)</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `
                },
                {
                    title: "Ohm's Law",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Ohm's Law</h3>
                            <div class="mt-4 p-4 bg-blue-50 rounded-lg">
                                <p class="font-semibold">Key Formula:</p>
                                <p class="text-lg text-center my-2">V = IR</p>
                                <p>Where:</p>
                                <ul class="list-disc list-inside">
                                    <li>V = Voltage (Volts)</li>
                                    <li>I = Current (Amperes)</li>
                                    <li>R = Resistance (Ohms)</li>
                                </ul>
                            </div>
                            <div class="mt-6">
                                <p>Use the simulation below to explore Ohm's Law:</p>
                                <ul class="list-disc list-inside mt-2">
                                    <li>Adjust voltage to see current change</li>
                                    <li>Modify resistance to affect current flow</li>
                                    <li>Observe the relationship between V, I, and R</li>
                                </ul>
                            </div>
                        </div>
                    `
                },
                {
                    title: "Electric Power",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Electric Power</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold">Power Formula</h4>
                                    <p class="text-center my-2">P = VI</p>
                                    <p>or</p>
                                    <p class="text-center my-2">P = I²R</p>
                                </div>
                                <div class="p-4 bg-green-50 rounded-lg">
                                    <h4 class="font-semibold">Applications</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Home appliances</li>
                                        <li>Electric motors</li>
                                        <li>LED lighting</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    `
                }
            ],
            quiz: [
                {
                    question: "According to Ohm's Law, if voltage is doubled and resistance remains constant, what happens to current?",
                    options: [
                        "It halves",
                        "It doubles",
                        "It stays the same",
                        "It becomes zero"
                    ],
                    correct: 1
                },
                {
                    question: "In a circuit with 12V and 6Ω resistance, what is the current?",
                    options: ["0.5A", "2A", "72A", "3A"],
                    correct: 1
                },
                {
                    question: "Electric power can be calculated using:",
                    options: ["V + I", "V × I", "V ÷ I", "V - I"],
                    correct: 1
                }
            ]
        };

        let currentStep = 0;
        let completedSteps = new Set();
        let electrons = [];
        let voltage = 6;
        let resistance = 10;

        const canvas = document.getElementById('circuitCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = 300;

        function drawCircuit() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw battery
            ctx.beginPath();
            ctx.moveTo(50, 150);
            ctx.lineTo(50, 100);
            ctx.moveTo(50, 200);
            ctx.lineTo(50, 250);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Battery terminals
            ctx.beginPath();
            ctx.moveTo(30, 100);
            ctx.lineTo(70, 100);
            ctx.moveTo(40, 90);
            ctx.lineTo(60, 90);
            ctx.stroke();

            // Draw wires
            ctx.beginPath();
            ctx.moveTo(50, 100);
            ctx.lineTo(100, 100);
            ctx.lineTo(100, 50);
            ctx.lineTo(500, 50);
            ctx.lineTo(500, 250);
            ctx.lineTo(50, 250);
            ctx.stroke();

            // Draw resistor
            ctx.beginPath();
            ctx.moveTo(450, 50);
            ctx.lineTo(450, 70);
            for(let i = 0; i < 4; i++) {
                ctx.lineTo(470, 80 + i * 20);
                ctx.lineTo(430, 100 + i * 20);
            }
            ctx.lineTo(450, 180);
            ctx.lineTo(450, 200);
            ctx.stroke();
        }

        function createElectron() {
            const electron = document.createElement('div');
            electron.className = 'electron';
            document.getElementById('electrons').appendChild(electron);
            return electron;
        }

        function updateElectrons() {
            const current = voltage / resistance;
            const electronCount = Math.min(Math.floor(current * 10), 20);
            
            // Remove excess electrons
            while(electrons.length > electronCount) {
                electrons[0].remove();
                electrons.shift();
            }
            
            // Add new electrons
            while(electrons.length < electronCount) {
                electrons.push(createElectron());
            }

            // Update electron positions
            const speed = current * 2;
            electrons.forEach((electron, index) => {
                const progress = (Date.now() / (1000 / speed) + index * (360 / electrons.length)) % 360;
                let x, y;

                if(progress < 90) {
                    x = 50 + progress/90 * 450;
                    y = 50;
                } else if(progress < 180) {
                    x = 500;
                    y = 50 + (progress-90)/90 * 200;
                } else if(progress < 270) {
                    x = 500 - (progress-180)/90 * 450;
                    y = 250;
                } else {
                    x = 50;
                    y = 250 - (progress-270)/90 * 200;
                }

                electron.style.transform = `translate(${x}px, ${y}px)`;
            });
        }

        function updateDisplays() {
            const current = voltage / resistance;
            const power = voltage * current;

            document.getElementById('voltageDisplay').textContent = voltage.toFixed(1) + ' V';
            document.getElementById('currentDisplay').textContent = current.toFixed(2) + ' A';
            document.getElementById('powerDisplay').textContent = power.toFixed(1) + ' W';
        }

        // Event listeners for sliders
        document.getElementById('voltageSlider').addEventListener('input', (e) => {
            voltage = parseInt(e.target.value);
            document.getElementById('voltageValue').textContent = voltage + ' V';
            updateDisplays();
        });

        document.getElementById('resistanceSlider').addEventListener('input', (e) => {
            resistance = parseInt(e.target.value);
            document.getElementById('resistanceValue').textContent = resistance + ' Ω';
            updateDisplays();
        });

        function renderSteps() {
            const stepsList = document.getElementById('stepsList');
            stepsList.innerHTML = '';
            topicData.steps.forEach((step, idx) => {
                const li = document.createElement('li');
                li.className = `cursor-pointer p-2 rounded ${idx === currentStep ? 'step-active' : 'step-inactive'}`;
                li.textContent = step.title;
                li.onclick = () => showStep(idx);
                stepsList.appendChild(li);
            });
        }

        function showStep(idx) {
            currentStep = idx;
            document.getElementById('stepContent').innerHTML = topicData.steps[idx].content;
            renderSteps();
            updateProgress();
            document.getElementById('prevBtn').disabled = idx === 0;
            document.getElementById('nextBtn').disabled = idx === topicData.steps.length - 1;
        }

        function updateProgress() {
            const percent = ((completedSteps.size) / topicData.steps.length) * 100;
            document.getElementById('progress').style.width = percent + '%';
        }

        function showQuiz() {
            const quizModal = document.getElementById('quizModal');
            quizModal.classList.remove('hidden');
            
            const quizContent = document.getElementById('quizContent');
            quizContent.innerHTML = topicData.quiz.map((q, idx) => `
                <div class="mb-6">
                    <p class="font-semibold mb-2">${idx + 1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => `
                            <label class="flex items-center">
                                <input type="radio" name="q${idx}" value="${i}" class="mr-2">
                                <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('closeQuiz').onclick = () => {
            document.getElementById('quizModal').classList.add('hidden');
        };

        document.getElementById('submitQuiz').onclick = () => {
            let score = 0;
            topicData.quiz.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                if (selected && parseInt(selected.value) === q.correct) score++;
            });
            
            const percent = (score / topicData.quiz.length) * 100;
            if (percent >= 70) {
                completedSteps.add(currentStep);
                updateProgress();
            }
            
            document.getElementById('quizContent').innerHTML = `
                <div class="text-center">
                    <p class="text-2xl font-bold ${percent >= 70 ? 'text-green-600' : 'text-red-600'}">${score}/${topicData.quiz.length}</p>
                    <p class="mt-2">${percent >= 70 ? 'Great job! You can move on to the next section.' : 'Try again to improve your score.'}</p>
                </div>
            `;
            document.getElementById('submitQuiz').style.display = 'none';
        };

        // Navigation buttons
        document.getElementById('prevBtn').onclick = () => {
            if (currentStep > 0) showStep(currentStep - 1);
        };

        document.getElementById('nextBtn').onclick = () => {
            if (currentStep < topicData.steps.length - 1) {
                showQuiz();
            }
        };

        // Initialize
        window.onload = () => {
            renderSteps();
            showStep(0);
            drawCircuit();
            setInterval(updateElectrons, 50);
            updateDisplays();

            // Handle window resize
            window.addEventListener('resize', () => {
                canvas.width = canvas.offsetWidth;
                drawCircuit();
            });
        };
    </script>
<!-- Topic Quiz System -->
<script src="/js/topic-quiz-loader.js"></script>
<script src="/js/topic-quiz-injector.js"></script>
</body>
</html>
