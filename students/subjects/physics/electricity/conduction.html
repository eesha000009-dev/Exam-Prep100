                            <p class="text-gray-700"><i class="fas fa-robot mr-2 text-blue-500"></i>Now that we understand what matter is, let me introduce you to an amazing theory that explains how particles behave in different forms of matter. This is going to be fascinating!</p>
                        </div>
                        <h3 class="text-xl font-semibold mb-4">The Kinetic Theory of Matter</h3>
                        <p class="mb-4">Let me explain this fascinating theory that helps us understand how particles behave in all forms of matter. Here are the key principles I want to share with you:</p>`,

                        `<ul class="list-decimal pl-6 space-y-3 text-gray-700">

                        `<p class="text-gray-700 mt-4">Now, let me show you a video animation that will help you visualize how these particles behave according to the theory we just learned!</p>
                        <div class="mt-4 bg-gray-50 p-6 rounded-lg border">
                            <h4 class="font-semibold mb-2"><i class="fas fa-play-circle text-blue-500 mr-2"></i>Video Explanation</h4>

                        `<ol class="relative border-l border-gray-200 space-y-6 pl-4">
                            <li>
                                <div class="absolute w-3 h-3 bg-gray-200 rounded-full mt-1.5 -left-1.5 border border-white"></div>
                                <h4 class="font-semibold">Solid to Liquid (Melting)</h4>
                                <p class="text-gray-700">When heat is applied to a solid, particles gain kinetic energy and vibrate more. This weakens the cohesive forces, allowing the solid to melt into a liquid.</p>

                        `<ol class="relative border-l border-gray-200 space-y-6 pl-4" start="2">
                            <li>
                                <div class="absolute w-3 h-3 bg-gray-200 rounded-full mt-1.5 -left-1.5 border border-white"></div>

                        `<p class="text-gray-700 mt-4">Now that we understand the theory, let me show you something amazing! I've prepared an interactive simulation where you can experiment with these state changes yourself. You can add or remove heat to see exactly how matter transforms from one state to another!</p>
                        <div class="mt-4 bg-gray-50 p-6 rounded-lg border">

                    type: "note",
                    content: [
                        `<div class="bg-blue-50 p-4 rounded-lg mb-4">
                            <p class="text-gray-700"><i class="fas fa-robot mr-2 text-blue-500"></i>Have you ever wondered why water droplets stick together, or why some liquids form beads while others spread out? I'm about to reveal the fascinating forces that make this happen!</p>

                            <div>
                                <h4 class="font-semibold">Cohesion</h4>
                                <p class="text-gray-700">The force of attraction between molecules of the <strong>same substance</strong>.</p>
                                <div class="bg-blue-50 p-3 mt-2 rounded-lg"><strong>Analogy:</strong> Self-love. Molecules loving themselves so much they stick together. (e.g., Mercury)</div>

                                <p class="text-gray-700">The force of attraction between molecules of <strong>different substances</strong>.</p>

                            <h4 class="font-semibold mb-2">Why does water wet glass, but mercury doesn't?</h4>

                        </div>
                        <h3 class="text-xl font-semibold mb-4">Surface Tension</h3>
                        <p class="mb-4 text-gray-700">Have you ever seen a water strider gliding effortlessly across a pond? The secret behind this amazing feat is something called surface tension. Let me explain how it works!</p>`,

                        `<div class="bg-blue-50 border-l-4 border-blue-500 p-4">
                            <p>Surface tension is a property of liquids where the surface acts like a thin, stretched elastic skin. It's caused by the cohesive forces between liquid molecules. At the surface, molecules are pulled inwards by their neighbors, creating a tight film.</p>

                        `<p class="text-gray-700 mt-4">Let me show you an amazing demonstration of surface tension in action! Watch how water striders and other insects use this property to their advantage.</p>

                    resources: [

                {

                        `<div class="bg-blue-50 p-4 rounded-lg mb-4">
                            <p class="text-gray-700"><i class="fas fa-robot mr-2 text-blue-500"></i>Get ready to discover something amazing - have you ever wondered how plants drink water through their roots and stems? Or why paper towels can soak up spills? I'm about to show you the incredible force behind these everyday phenomena!</p>

                        `<p class="mb-4 text-gray-700">Let me introduce you to capillarity - a fascinating process where liquids can climb up or sink down in narrow spaces, all thanks to the combined powers of adhesion, cohesion, and surface tension. It's like watching a liquid defy gravity!</p>

                            <h4 class="font-semibold mb-2">Fun Experiment!</h4>

                    resources: [

                        options: ["Its cohesion is stronger than its adhesion", "It is less dense than glass", "Its adhesion to the glass is stronger than its cohesion", "It has low surface tension"],

                        explanation: "Water molecules are more attracted to the glass (adhesion) than to each other (cohesion), causing them to 'climb' the sides of the tube."

        };

        let currentStepIndex = 0;
        let stepsCompleted = [];
        let currentChunkIndex = 0; // For interactive content

        const stepsListEl = document.getElementById('stepsList');
        const stepContainerEl = document.getElementById('stepContainer');
        const resourcesGridEl = document.getElementById('resourcesGrid');
        const prevStepBtn = document.getElementById('prevStepBtn');
        const nextStepBtn = document.getElementById('nextStepBtn');
        const quizModalEl = document.getElementById('quizModal');
        const quizContentEl = document.getElementById('quizContent');
        const resourceModalEl = document.getElementById('resourceModal');
        const resourceModalTitleEl = document.getElementById('resourceModalTitle');
        const resourceModalContentEl = document.getElementById('resourceModalContent');
        const closeResourceModalBtn = document.getElementById('closeResourceModal');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');

        function initializePage() {
            document.getElementById('topicTitle').textContent = topicData.title;
            renderStepsList();
            loadStep(0);
        }

        function renderStepsList() {
            stepsListEl.innerHTML = '';
            topicData.steps.forEach((step, index) => {
                const li = document.createElement('li');
                const isCompleted = stepsCompleted.includes(step.id);
                li.innerHTML = `
                    <button data-index="${index}" class="step-button w-full text-left px-3 py-2 rounded flex items-center justify-between text-gray-600 hover:bg-gray-50 ${index === currentStepIndex ? 'active' : ''}">
                        <span class="flex items-center">
                            <i class="fas fa-book mr-2"></i>
                            ${step.title}
                        </span>
                        ${isCompleted ? '<i class="fas fa-check-circle text-green-500"></i>' : ''}
                    </button>
                `;
                stepsListEl.appendChild(li);
            });
            document.querySelectorAll('.step-button').forEach(btn => {
                btn.addEventListener('click', (e) => loadStep(parseInt(e.currentTarget.dataset.index)));
            });
        }

        function handleInteractiveClick() {
            const step = topicData.steps[currentStepIndex];
            if (!Array.isArray(step.content)) return;

            currentChunkIndex++;

            const instruction = document.getElementById('click-instruction');
            if (instruction) {
                instruction.remove();
            }

            if (currentChunkIndex < step.content.length) {
                const chunk = step.content[currentChunkIndex];
                const div = document.createElement('div');
                div.innerHTML = chunk;
                div.style.opacity = 0;
                stepContainerEl.appendChild(div);
                
                div.classList.add('animate-fade-in-up');
                div.style.opacity = 1;

                if (currentChunkIndex < step.content.length - 1) {
                    const newInstruction = document.createElement('div');
                    newInstruction.id = 'click-instruction';
                    newInstruction.className = 'text-center text-gray-500 mt-8 animate-pulse flex items-center justify-center';
                    newInstruction.innerHTML = '<i class="fas fa-hand-pointer mr-2"></i>Click anywhere to continue...';
                    stepContainerEl.appendChild(newInstruction);
                }
            } 
            
            if (currentChunkIndex >= step.content.length - 1) {
                stepContainerEl.removeEventListener('click', handleInteractiveClick);
            }
        }

        function loadStep(index) {
            currentStepIndex = index;
            const step = topicData.steps[index];
            stepContainerEl.innerHTML = '';
            stepContainerEl.removeEventListener('click', handleInteractiveClick);

            if (Array.isArray(step.content)) {
                currentChunkIndex = 0;
                const firstChunk = step.content[0];
                const div = document.createElement('div');
                
                if (currentMode === 'ai') {
                    // AI Chat Mode
                    div.className = 'chat-message ai-message';
                    const messageContent = document.createElement('div');
                    messageContent.className = 'message-content bg-blue-50 rounded-lg p-4 shadow-sm max-w-3xl ml-2';
                    messageContent.innerHTML = firstChunk;
                    div.appendChild(messageContent);
                } else {
                    // Learn Mode
                    div.innerHTML = firstChunk;
                }
                
                div.style.opacity = 0;
                stepContainerEl.appendChild(div);
                div.classList.add('animate-fade-in-up');
                div.style.opacity = 1;

                if (step.content.length > 1) {
                    const instruction = document.createElement('div');
                    instruction.id = 'click-instruction';
                    if (currentMode === 'ai') {
                        instruction.className = 'user-action mt-4 flex justify-center';
                        instruction.innerHTML = `
                            <button class="bg-blue-500 text-white px-6 py-2 rounded-full hover:bg-blue-600 transition-colors flex items-center">
                                <span>Continue</span>
                                <i class="fas fa-arrow-right ml-2"></i>
                            </button>
                        `;
                    } else {
                        instruction.className = 'text-center text-gray-500 mt-8 animate-pulse';
                        instruction.textContent = 'Click on the screen to continue';
                    }
                    stepContainerEl.appendChild(instruction);
                    if (currentMode === 'ai') {
                        instruction.querySelector('button').addEventListener('click', handleInteractiveClick);
                    } else {
                        stepContainerEl.addEventListener('click', handleInteractiveClick);
                    }
                }
            } else {
                stepContainerEl.innerHTML = step.content;
            }

            resourcesGridEl.innerHTML = '';
            if (step.resources && step.resources.length > 0) {
                step.resources.forEach(res => {
                    const icon = res.type === 'video' ? 'fa-play-circle' : (res.type === 'simulation' ? 'fa-laptop-code' : 'fa-image');
                    const card = document.createElement('div');
                    card.className = 'resource-card bg-gray-50 rounded-lg p-4 cursor-pointer hover:shadow-md';
                    card.innerHTML = `
                        <div class="text-blue-500 mb-3"><i class="fas ${icon} text-2xl"></i></div>
                        <h4 class="font-medium mb-1">${res.title}</h4>
                        <p class="text-sm text-gray-600">${res.description}</p>
                    `;
                    card.onclick = () => openResource(res);
                    resourcesGridEl.appendChild(card);
                });
                document.getElementById('resourcesContainer').style.display = 'block';
            } else {
                document.getElementById('resourcesContainer').style.display = 'none';
            }
            
            updateNavButtons();
            renderStepsList();
        }

        function updateNavButtons() {
            prevStepBtn.disabled = currentStepIndex === 0;
            nextStepBtn.disabled = false; // Always enable the next button

            const isCompleted = stepsCompleted.includes(topicData.steps[currentStepIndex].id);
            if (currentStepIndex === topicData.steps.length - 1 && isCompleted) {
                 nextStepBtn.textContent = 'Finish Topic';
            } else {
                 nextStepBtn.innerHTML = 'Next <i class="fas fa-chevron-right ml-2"></i>';
            }
        }
        
        function openResource(resource) {
            resourceModalTitleEl.textContent = resource.title;
            if (resource.type === 'video') {
                resourceModalContentEl.innerHTML = `<div class="aspect-w-16 aspect-h-9"><iframe src="${resource.url}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen class="w-full h-full"></iframe></div>`;
            } else if (resource.type === 'simulation') {
                resourceModalContentEl.innerHTML = `<iframe src="${resource.url}" class="w-full h-[60vh]" frameborder="0"></iframe>`;
            } else if (resource.type === 'image') {
                resourceModalContentEl.innerHTML = `<img src="${resource.url}" alt="${resource.title}" class="w-full h-auto rounded-lg">`;
            }
            resourceModalEl.classList.remove('hidden');
        }

        function showQuiz() {
            const step = topicData.steps[currentStepIndex];
            if (!step.quiz) return;

            let optionsHtml = step.quiz.options.map((opt, index) => `
                <label class="quiz-option flex items-center space-x-3 p-3 rounded-lg border hover:bg-gray-50 cursor-pointer">
                    <input type="radio" name="quizOption" value="${index}" class="h-4 w-4 text-blue-600">
                    <span>${opt}</span>
                </label>
            `).join('');

            quizContentEl.innerHTML = `
                <h3 class="text-xl font-semibold mb-4">Knowledge Check: ${step.title}</h3>
                <p class="mb-4">${step.quiz.question}</p>
                <div id="quizOptions" class="space-y-2">${optionsHtml}</div>
                <div id="quizFeedback" class="hidden mt-4"></div>
                <div class="mt-6 flex justify-end">
                    <button id="submitQuizBtn" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">Submit Answer</button>
                    <button id="closeQuizBtn" class="hidden ml-2 px-4 py-2 bg-gray-200 text-gray-800 rounded-lg">Close</button>
                </div>
            `;
            quizModalEl.classList.remove('hidden');

            document.getElementById('submitQuizBtn').addEventListener('click', submitQuiz);
            document.getElementById('closeQuizBtn').addEventListener('click', () => {
                quizModalEl.classList.add('hidden');
                if (stepsCompleted.includes(step.id) && currentStepIndex < topicData.steps.length - 1) {
                    loadStep(currentStepIndex + 1);
                }
            });
        }

        function submitQuiz() {
            const step = topicData.steps[currentStepIndex];
            const selectedOption = document.querySelector('input[name="quizOption"]:checked');
            if (!selectedOption) return;

            const answerIndex = parseInt(selectedOption.value);
            const isCorrect = answerIndex === step.quiz.correct;
            const feedbackEl = document.getElementById('quizFeedback');
            
            document.querySelectorAll('.quiz-option').forEach((opt, index) => {
                opt.classList.remove('selected');
                if (index === step.quiz.correct) opt.classList.add('correct');
                if (index === answerIndex && !isCorrect) opt.classList.add('incorrect');
            });
            
            if (isCorrect) {
                feedbackEl.innerHTML = `<div class="p-4 bg-green-50 text-green-700 rounded-lg"><strong class="font-semibold">Correct!</strong> ${step.quiz.explanation}</div>`;
                if (!stepsCompleted.includes(step.id)) {
                    stepsCompleted.push(step.id);
                }
                updateProgress();
            } else {
                feedbackEl.innerHTML = `<div class="p-4 bg-red-50 text-red-700 rounded-lg"><strong class="font-semibold">Not quite.</strong> ${step.quiz.explanation}</div>`;
            }
            
            feedbackEl.classList.remove('hidden');
            document.getElementById('submitQuizBtn').style.display = 'none';
            document.getElementById('closeQuizBtn').textContent = isCorrect ? 'Continue' : 'Try Again';
            document.getElementById('closeQuizBtn').style.display = 'block';
            updateNavButtons();
        }
        
        function updateProgress() {
            const progress = (stepsCompleted.length / topicData.steps.length) * 100;
            progressBar.style.width = `${progress}%`;
            progressPercent.textContent = `${Math.round(progress)}%`;
            renderStepsList();
        }

        prevStepBtn.addEventListener('click', () => {
            if (currentStepIndex > 0) {
                loadStep(currentStepIndex - 1);
            }
        });

        nextStepBtn.addEventListener('click', () => {
            const isCompleted = stepsCompleted.includes(topicData.steps[currentStepIndex].id);
            if (isCompleted) {
                if (currentStepIndex < topicData.steps.length - 1) {
                    loadStep(currentStepIndex + 1);
                } else {
                    alert('Topic completed!');
                }
            } else {
                showQuiz();
            }
        });

        closeResourceModalBtn.addEventListener('click', () => resourceModalEl.classList.add('hidden'));

        initializePage();
    </script>
                        <h3 class="about-title">About content</h3>
                </div>

                    <p style="font-size: 0.9; text-align: center;">
                        Simulation by

                    </p>
                    </div>
