<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light and Optics - Interactive Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        .step-active { background-color: #2563eb; color: white; }
        .step-inactive { background-color: #e5e7eb; color: #374151; }
        #opticsCanvas { touch-action: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-inter">
    <nav class="bg-blue-700 p-4">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="../index.html" class="text-white hover:text-blue-100 flex items-center gap-2">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Physics</span>
            </a>
            <h1 class="text-white text-xl font-bold">Light and Optics</h1>
        </div>
    </nav>

    <div class="flex">
        <!-- Sidebar Steps -->
        <aside class="w-64 bg-white shadow-md p-4 min-h-screen">
            <h2 class="text-lg font-semibold mb-4">Learning Steps</h2>
            <ul id="stepsList" class="space-y-2"></ul>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <div id="progressBar" class="mb-6 h-3 bg-gray-200 rounded-full overflow-hidden">
                <div id="progress" class="h-full bg-blue-600 transition-all" style="width: 0%"></div>
            </div>

            <div id="stepContent" class="bg-white rounded-xl shadow-sm p-6 min-h-[300px]"></div>

            <!-- Ray Diagram Simulation -->
            <div id="simulationContainer" class="mt-6 bg-white rounded-xl shadow-sm p-6">
                <h3 class="text-lg font-semibold mb-4">Interactive Ray Diagram</h3>
                <div class="flex gap-4 mb-4">
                    <button id="convexLensBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                        Convex Lens
                    </button>
                    <button id="concaveLensBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                        Concave Lens
                    </button>
                    <button id="mirrorBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                        Mirror
                    </button>
                </div>
                <canvas id="opticsCanvas" class="w-full border rounded-lg bg-gray-50" height="400"></canvas>
                <div class="mt-4 grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Object Distance (cm)</label>
                        <input type="range" id="objectDistanceSlider" min="10" max="100" value="50" class="w-full">
                        <span id="objectDistanceValue" class="text-sm text-gray-600">50 cm</span>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Focal Length (cm)</label>
                        <input type="range" id="focalLengthSlider" min="10" max="50" value="30" class="w-full">
                        <span id="focalLengthValue" class="text-sm text-gray-600">30 cm</span>
                    </div>
                </div>
                <div class="mt-4 p-4 bg-blue-50 rounded-lg">
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div>
                            <p class="text-sm font-medium text-gray-700">Image Distance</p>
                            <p id="imageDistanceDisplay" class="text-lg font-bold text-blue-600">--</p>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-700">Magnification</p>
                            <p id="magnificationDisplay" class="text-lg font-bold text-blue-600">--</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-between mt-8">
                <button id="prevBtn" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400" disabled>Previous</button>
                <button id="nextBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Next</button>
            </div>
        </main>
    </div>

    <!-- Quiz Modal -->
    <div id="quizModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-lg w-full">
            <h3 class="text-xl font-bold mb-4">Check Your Understanding</h3>
            <div id="quizContent"></div>
            <div class="mt-6 flex justify-end gap-4">
                <button id="closeQuiz" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">Close</button>
                <button id="submitQuiz" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Submit</button>
            </div>
        </div>
    </div>

    <script>
        const topicData = {
            title: "Light and Optics",
            steps: [
                {
                    title: "Basic Concepts",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Properties of Light</h3>
                            <div class="space-y-6">
                                <div class="p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold">Wave Nature</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Light travels in waves</li>
                                        <li>Has both wave and particle properties</li>
                                        <li>Travels at 3×10⁸ m/s in vacuum</li>
                                    </ul>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="p-4 bg-green-50 rounded-lg">
                                        <h4 class="font-semibold">Reflection</h4>
                                        <p>Light bounces off surfaces at equal angles</p>
                                        <p class="text-sm text-green-600">Angle of incidence = Angle of reflection</p>
                                    </div>
                                    <div class="p-4 bg-yellow-50 rounded-lg">
                                        <h4 class="font-semibold">Refraction</h4>
                                        <p>Light bends when entering new medium</p>
                                        <p class="text-sm text-yellow-600">Depends on refractive index</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `
                },
                {
                    title: "Lenses",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Types of Lenses</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold">Convex Lens</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Converging lens</li>
                                        <li>Thicker in middle</li>
                                        <li>Forms real images</li>
                                    </ul>
                                </div>
                                <div class="p-4 bg-green-50 rounded-lg">
                                    <h4 class="font-semibold">Concave Lens</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Diverging lens</li>
                                        <li>Thinner in middle</li>
                                        <li>Forms virtual images</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="mt-4 p-4 bg-yellow-50 rounded-lg">
                                <p class="font-semibold">Lens Formula:</p>
                                <p class="text-lg text-center my-2">1/f = 1/u + 1/v</p>
                                <p>Where:</p>
                                <ul class="list-disc list-inside">
                                    <li>f = focal length</li>
                                    <li>u = object distance</li>
                                    <li>v = image distance</li>
                                </ul>
                            </div>
                        </div>
                    `
                },
                {
                    title: "Applications",
                    content: `
                        <div class="prose max-w-none">
                            <h3 class="text-xl font-bold mb-4">Optical Instruments</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold">Human Eye</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Natural convex lens</li>
                                        <li>Variable focal length</li>
                                        <li>Forms real image</li>
                                    </ul>
                                </div>
                                <div class="p-4 bg-green-50 rounded-lg">
                                    <h4 class="font-semibold">Cameras</h4>
                                    <ul class="list-disc list-inside">
                                        <li>Adjustable aperture</li>
                                        <li>Focus mechanism</li>
                                        <li>Digital sensors</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    `
                }
            ],
            quiz: [
                {
                    question: "What type of lens is used to correct nearsightedness?",
                    options: [
                        "Convex lens",
                        "Concave lens",
                        "Bifocal lens",
                        "Cylindrical lens"
                    ],
                    correct: 1
                },
                {
                    question: "According to the lens formula, if an object is placed at the focal point, where will the image form?",
                    options: ["At infinity", "At focal point", "Between F and 2F", "No image forms"],
                    correct: 0
                },
                {
                    question: "When light passes from air to glass, it:",
                    options: ["Speeds up", "Slows down", "Maintains speed", "Disappears"],
                    correct: 1
                }
            ]
        };

        let currentStep = 0;
        let completedSteps = new Set();
        let currentLensType = 'convex';
        
        const canvas = document.getElementById('opticsCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = 400;

        let objectDistance = 50;
        let focalLength = 30;
        const objectHeight = 40;

        function drawAxis() {
            const centerY = canvas.height / 2;
            
            // Principal axis
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            ctx.lineTo(canvas.width, centerY);
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Scale markers
            for(let x = 0; x <= canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, centerY - 5);
                ctx.lineTo(x, centerY + 5);
                ctx.stroke();
            }
        }

        function drawLens() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const lensHeight = 150;

            ctx.beginPath();
            if(currentLensType === 'convex') {
                // Draw convex lens
                ctx.beginPath();
                ctx.moveTo(centerX, centerY - lensHeight/2);
                ctx.quadraticCurveTo(centerX + 15, centerY, centerX, centerY + lensHeight/2);
                ctx.moveTo(centerX, centerY - lensHeight/2);
                ctx.quadraticCurveTo(centerX - 15, centerY, centerX, centerY + lensHeight/2);
            } else {
                // Draw concave lens
                ctx.beginPath();
                ctx.moveTo(centerX, centerY - lensHeight/2);
                ctx.quadraticCurveTo(centerX - 15, centerY, centerX, centerY + lensHeight/2);
                ctx.moveTo(centerX, centerY - lensHeight/2);
                ctx.quadraticCurveTo(centerX + 15, centerY, centerX, centerY + lensHeight/2);
            }
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw focal points
            const F1 = centerX - focalLength * 2;
            const F2 = centerX + focalLength * 2;
            
            ctx.beginPath();
            ctx.moveTo(F1, centerY - 10);
            ctx.lineTo(F1, centerY + 10);
            ctx.moveTo(F2, centerY - 10);
            ctx.lineTo(F2, centerY + 10);
            ctx.strokeStyle = '#ef4444';
            ctx.stroke();

            // Label focal points
            ctx.fillStyle = '#ef4444';
            ctx.font = '14px Inter';
            ctx.fillText('F', F1 - 5, centerY + 25);
            ctx.fillText('F', F2 - 5, centerY + 25);
        }

        function drawObject() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const objX = centerX - objectDistance * 2;

            // Draw object (arrow)
            ctx.beginPath();
            ctx.moveTo(objX, centerY);
            ctx.lineTo(objX, centerY - objectHeight);
            ctx.lineTo(objX - 5, centerY - objectHeight + 5);
            ctx.moveTo(objX, centerY - objectHeight);
            ctx.lineTo(objX + 5, centerY - objectHeight + 5);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawRays() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const objX = centerX - objectDistance * 2;
            const objY = centerY - objectHeight;

            // Calculate image position using lens formula
            const f = focalLength;
            const u = objectDistance;
            const v = (u * f) / (u - f);
            const imgX = centerX + v * 2;
            const m = -v / u;
            const imgHeight = objectHeight * m;
            const imgY = centerY - imgHeight;

            ctx.beginPath();
            
            // Ray parallel to principal axis
            ctx.moveTo(objX, objY);
            ctx.lineTo(centerX, objY);
            if(currentLensType === 'convex') {
                ctx.lineTo(imgX, imgY);
            } else {
                // For concave lens, ray diverges
                const slope = (centerY - objY) / (centerX - objX);
                ctx.lineTo(canvas.width, objY + (canvas.width - centerX) * slope);
            }

            // Ray through optical center
            ctx.moveTo(objX, objY);
            ctx.lineTo(imgX, imgY);

            // Ray through focal point
            const F1 = centerX - focalLength * 2;
            ctx.moveTo(objX, objY);
            ctx.lineTo(F1, centerY);
            if(currentLensType === 'convex') {
                ctx.lineTo(imgX, imgY);
            } else {
                const slope = (centerY - objY) / (F1 - objX);
                ctx.lineTo(canvas.width, objY + (canvas.width - F1) * slope);
            }

            ctx.strokeStyle = '#ef4444';
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Update displays
            document.getElementById('imageDistanceDisplay').textContent = 
                Math.abs(v).toFixed(1) + ' cm';
            document.getElementById('magnificationDisplay').textContent = 
                Math.abs(m).toFixed(2) + 'x';
        }

        function updateDiagram() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawAxis();
            drawLens();
            drawObject();
            drawRays();
        }

        // Event listeners for controls
        document.getElementById('objectDistanceSlider').addEventListener('input', (e) => {
            objectDistance = parseInt(e.target.value);
            document.getElementById('objectDistanceValue').textContent = objectDistance + ' cm';
            updateDiagram();
        });

        document.getElementById('focalLengthSlider').addEventListener('input', (e) => {
            focalLength = parseInt(e.target.value);
            document.getElementById('focalLengthValue').textContent = focalLength + ' cm';
            updateDiagram();
        });

        document.getElementById('convexLensBtn').onclick = () => {
            currentLensType = 'convex';
            document.getElementById('convexLensBtn').className = 'px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700';
            document.getElementById('concaveLensBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
            updateDiagram();
        };

        document.getElementById('concaveLensBtn').onclick = () => {
            currentLensType = 'concave';
            document.getElementById('concaveLensBtn').className = 'px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700';
            document.getElementById('convexLensBtn').className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
            updateDiagram();
        };

        function renderSteps() {
            const stepsList = document.getElementById('stepsList');
            stepsList.innerHTML = '';
            topicData.steps.forEach((step, idx) => {
                const li = document.createElement('li');
                li.className = `cursor-pointer p-2 rounded ${idx === currentStep ? 'step-active' : 'step-inactive'}`;
                li.textContent = step.title;
                li.onclick = () => showStep(idx);
                stepsList.appendChild(li);
            });
        }

        function showStep(idx) {
            currentStep = idx;
            document.getElementById('stepContent').innerHTML = topicData.steps[idx].content;
            renderSteps();
            updateProgress();
            document.getElementById('prevBtn').disabled = idx === 0;
            document.getElementById('nextBtn').disabled = idx === topicData.steps.length - 1;
        }

        function updateProgress() {
            const percent = ((completedSteps.size) / topicData.steps.length) * 100;
            document.getElementById('progress').style.width = percent + '%';
        }

        function showQuiz() {
            const quizModal = document.getElementById('quizModal');
            quizModal.classList.remove('hidden');
            
            const quizContent = document.getElementById('quizContent');
            quizContent.innerHTML = topicData.quiz.map((q, idx) => `
                <div class="mb-6">
                    <p class="font-semibold mb-2">${idx + 1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => `
                            <label class="flex items-center">
                                <input type="radio" name="q${idx}" value="${i}" class="mr-2">
                                <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('closeQuiz').onclick = () => {
            document.getElementById('quizModal').classList.add('hidden');
        };

        document.getElementById('submitQuiz').onclick = () => {
            let score = 0;
            topicData.quiz.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                if (selected && parseInt(selected.value) === q.correct) score++;
            });
            
            const percent = (score / topicData.quiz.length) * 100;
            if (percent >= 70) {
                completedSteps.add(currentStep);
                updateProgress();
            }
            
            document.getElementById('quizContent').innerHTML = `
                <div class="text-center">
                    <p class="text-2xl font-bold ${percent >= 70 ? 'text-green-600' : 'text-red-600'}">${score}/${topicData.quiz.length}</p>
                    <p class="mt-2">${percent >= 70 ? 'Great job! You can move on to the next section.' : 'Try again to improve your score.'}</p>
                </div>
            `;
            document.getElementById('submitQuiz').style.display = 'none';
        };

        // Navigation buttons
        document.getElementById('prevBtn').onclick = () => {
            if (currentStep > 0) showStep(currentStep - 1);
        };

        document.getElementById('nextBtn').onclick = () => {
            if (currentStep < topicData.steps.length - 1) {
                showQuiz();
            }
        };

        // Initialize
        window.onload = () => {
            renderSteps();
            showStep(0);
            updateDiagram();

            // Handle window resize
            window.addEventListener('resize', () => {
                canvas.width = canvas.offsetWidth;
                updateDiagram();
            });
        };
    </script>
<!-- Topic Quiz System -->
<script src="/js/topic-quiz-loader.js"></script>
<script src="/js/topic-quiz-injector.js"></script>
</body>
</html>
