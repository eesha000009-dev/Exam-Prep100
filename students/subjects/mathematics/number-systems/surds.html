<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Surds — simplify & rationalize</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>.card{background:#fff;padding:1rem;border-radius:10px;box-shadow:0 10px 30px rgba(2,6,23,0.06)} .mono{font-family:ui-monospace, monospace}</style>
</head>
<body class="bg-teal-50 font-sans">
  <header class="bg-teal-700 text-white py-3 mb-6"><div class="max-w-5xl mx-auto px-4 flex items-center justify-between"><div class="font-semibold">Surds</div><a href="index.html" class="text-white/90">Back</a></div></header>

  <main class="max-w-5xl mx-auto px-4 space-y-6">
    <section class="card"><h2 class="text-lg font-semibold">What are surds?</h2><div class="mt-2 text-gray-700">Surds are roots that can't be simplified to rational numbers; simplify by extracting squares.</div></section>

    <section class="card">
      <h2 class="text-lg font-semibold">Worked example</h2>
      <div class="mt-2 text-gray-700">√50 = √(25×2) = 5√2. Rationalize 1/√2 = √2/2.</div>
    </section>

    <section class="card">
      <h2 class="text-lg font-semibold">Practice</h2>
      <div class="grid md:grid-cols-2 gap-4 mt-3">
        <div class="p-3 bg-gray-50 rounded"><div class="font-medium">1) Simplify √50</div><input id="su1" class="mt-2 p-2 border rounded w-full" placeholder="e.g., 5√2"><div class="mt-2 flex gap-2"><button id="sc1" class="px-3 py-1 bg-teal-700 text-white rounded">Check</button><button id="sh1" class="px-3 py-1 border rounded">Hint</button></div><div id="sfb1" class="mt-2 text-sm"></div></div>

        <div class="p-3 bg-gray-50 rounded"><div class="font-medium">2) Rationalize 3/√3</div><input id="su2" class="mt-2 p-2 border rounded w-full" placeholder="e.g., √3"><div class="mt-2 flex gap-2"><button id="sc2" class="px-3 py-1 bg-teal-700 text-white rounded">Check</button><button id="sh2" class="px-3 py-1 border rounded">Hint</button></div><div id="sfb2" class="mt-2 text-sm"></div></div>
      </div>
    </section>

    <div class="text-right"><button id="suQuiz" class="bg-teal-700 text-white px-4 py-2 rounded">Mini Quiz</button></div>
  </main>

  <div id="suModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-center justify-center"><div class="bg-white rounded p-6 max-w-md w-full"><div id="suContent"></div><div class="mt-4 text-right"><button id="suClose" class="px-3 py-1 border rounded">Close</button></div></div></div>

  <script>
    function norm(s){return (s||'').toString().trim().replace(/\s+/g,'');}
    document.getElementById('sc1').addEventListener('click', ()=>{ const v=norm(document.getElementById('su1').value); const fb=document.getElementById('sfb1'); if(v.replace(/\u221A/g,'sqrt').toLowerCase().includes('5')&&v.toLowerCase().includes('2')) fb.innerHTML='<span style="color:#16a34a">Correct — 5√2</span>'; else fb.innerHTML='<span style="color:#e11d48">Try: √50 = √(25×2) = 5√2</span>'; });
    document.getElementById('sh1').addEventListener('click', ()=> alert('Hint: factor 50 into 25×2'));
    document.getElementById('sc2').addEventListener('click', ()=>{ const v=norm(document.getElementById('su2').value); const fb=document.getElementById('sfb2'); if(v.toLowerCase().includes('sqrt3')||v.toLowerCase().includes('√3')||v==='√3') fb.innerHTML='<span style="color:#16a34a">Correct — √3</span>'; else fb.innerHTML='<span style="color:#e11d48">Try rationalizing by multiplying numerator and denominator by √3</span>'; });
    document.getElementById('sh2').addEventListener('click', ()=> alert('Hint: multiply 3/√3 by √3/√3'));

    const pool=[{q:'Simplify √18', a:['3√2','3sqrt2']},{q:'Rationalize 1/√5', a:['√5/5','sqrt5/5']}];
    function show(){ let i=0,score=0; const modal=document.getElementById('suModal'); const content=document.getElementById('suContent'); modal.classList.remove('hidden'); function next(){ if(i>=pool.length){ content.innerHTML=`<div class="font-bold">Done</div><div>Score: ${score}/${pool.length}</div>`; return; } const cur=pool[i]; content.innerHTML=`<div class="font-semibold">${cur.q}</div><input id="qa" class="mt-3 p-2 border rounded w-full"><div class="mt-3"><button id="subq" class="px-3 py-1 bg-teal-700 text-white rounded">Submit</button></div><div id="qfb" class="mt-2"></div>`; document.getElementById('subq').onclick=()=>{ const a=(document.getElementById('qa').value||'').replace(/\s+/g,'').toLowerCase(); if(cur.a.some(x=>x.replace(/\s+/g,'').toLowerCase()===a)) { score++; document.getElementById('qfb').innerHTML='<span style="color:#16a34a">Correct</span>'; } else document.getElementById('qfb').innerHTML=`<span style="color:#e11d48">Wrong — ${cur.a[0]}</span>`; i++; setTimeout(next,700); }; }
    next(); }
    document.getElementById('suQuiz').addEventListener('click', show);
    document.getElementById('suClose').addEventListener('click', ()=> document.getElementById('suModal').classList.add('hidden'));
  </script>
</body>
</html>
