<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Number Bases — binary, hex, conversions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>.card{background:#fff;padding:1rem;border-radius:10px;box-shadow:0 10px 30px rgba(2,6,23,0.06)} .mono{font-family:ui-monospace, monospace}</style>
</head>
<body class="bg-teal-50 font-sans">
  <header class="bg-teal-700 text-white py-3 mb-6"><div class="max-w-5xl mx-auto px-4 flex items-center justify-between"><div class="font-semibold">Number Bases</div><a href="index.html" class="text-white/90">Back</a></div></header>

  <main class="max-w-5xl mx-auto px-4 space-y-6">
    <section class="card"><h2 class="text-lg font-semibold">Place values</h2><div class="mt-2 text-gray-700">In base b, digits represent powers of b. Example: 1101₂ = 1×8 + 1×4 + 0×2 + 1×1 = 13.</div></section>

    <section class="card">
      <h2 class="text-lg font-semibold">Place-value SVG</h2>
      <div class="mt-3 text-sm text-gray-700">Binary digits map to 2^n places.</div>
      <div class="mt-4 flex justify-center">
        <svg width="340" height="60" xmlns="http://www.w3.org/2000/svg"><text x="10" y="20" font-size="12">1101₂ → [8][4][2][1]</text></svg>
      </div>
    </section>

    <section class="card">
      <h2 class="text-lg font-semibold">Practice</h2>
      <div class="grid md:grid-cols-2 gap-4 mt-3">
        <div class="p-3 bg-gray-50 rounded"><div class="font-medium">1) Convert 255 (dec) to hex</div><input id="b1" class="mt-2 p-2 border rounded w-full" placeholder="e.g., FF"><div class="mt-2 flex gap-2"><button id="bc1" class="px-3 py-1 bg-teal-700 text-white rounded">Check</button><button id="bh1" class="px-3 py-1 border rounded">Hint</button></div><div id="bfb1" class="mt-2 text-sm"></div></div>

        <div class="p-3 bg-gray-50 rounded"><div class="font-medium">2) Add binary: 1011 + 1101 = ?</div><input id="b2" class="mt-2 p-2 border rounded w-full" placeholder="e.g., 11000"><div class="mt-2 flex gap-2"><button id="bc2" class="px-3 py-1 bg-teal-700 text-white rounded">Check</button><button id="bh2" class="px-3 py-1 border rounded">Hint</button></div><div id="bfb2" class="mt-2 text-sm"></div></div>
      </div>
    </section>

    <div class="text-right"><button id="bQuiz" class="bg-teal-700 text-white px-4 py-2 rounded">Quick Quiz</button></div>
  </main>

  <div id="bModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-center justify-center"><div class="bg-white rounded p-6 max-w-md w-full"><div id="bContent"></div><div class="mt-4 text-right"><button id="bClose" class="px-3 py-1 border rounded">Close</button></div></div></div>

  <script>
    function norm(s){return (s||'').toString().trim().toUpperCase();}
    document.getElementById('bc1').addEventListener('click', ()=>{ const v=norm(document.getElementById('b1').value); const fb=document.getElementById('bfb1'); if(v==='FF') fb.innerHTML='<span style="color:#16a34a">Correct — FF</span>'; else fb.innerHTML='<span style="color:#e11d48">Try again — 255 = 16^2−1 = FF</span>'; });
    document.getElementById('bh1').addEventListener('click', ()=> alert('Hint: 255 = 15×16 + 15 → digits F and F'));
    document.getElementById('bc2').addEventListener('click', ()=>{ const v=norm(document.getElementById('b2').value); const fb=document.getElementById('bfb2'); if(v==='11000') fb.innerHTML='<span style="color:#16a34a">Correct — 11000</span>'; else fb.innerHTML='<span style="color:#e11d48">Try binary addition with carries</span>'; });
    document.getElementById('bh2').addEventListener('click', ()=> alert('Hint: add right-to-left with carries'));

    const pool=[{q:'1101₂ decimal = ?', a:['13']},{q:'FF hex decimal = ?', a:['255']}];
    function show(){ let i=0,score=0; const modal=document.getElementById('bModal'); const content=document.getElementById('bContent'); modal.classList.remove('hidden'); function next(){ if(i>=pool.length){ content.innerHTML=`<div class="font-bold">Done</div><div>Score: ${score}/${pool.length}</div>`; return; } const cur=pool[i]; content.innerHTML=`<div class="font-semibold">${cur.q}</div><input id="qa" class="mt-3 p-2 border rounded w-full"><div class="mt-3"><button id="subq" class="px-3 py-1 bg-teal-700 text-white rounded">Submit</button></div><div id="qfb" class="mt-2"></div>`; document.getElementById('subq').onclick=()=>{ const a=(document.getElementById('qa').value||'').trim(); if(cur.a.includes(a)) { score++; document.getElementById('qfb').innerHTML='<span style="color:#16a34a">Correct</span>'; } else document.getElementById('qfb').innerHTML=`<span style="color:#e11d48">Wrong — ${cur.a[0]}</span>`; i++; setTimeout(next,700); }; }
    next(); }
    document.getElementById('bQuiz').addEventListener('click', show);
    document.getElementById('bClose').addEventListener('click', ()=> document.getElementById('bModal').classList.add('hidden'));
  </script>
<!-- Topic Quiz System -->
<script src="/js/topic-quiz-loader.js"></script>
<script src="/js/topic-quiz-injector.js"></script>
</body>
</html>
