<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sets — notation & Venn diagrams</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>.card{background:#fff;padding:1rem;border-radius:10px;box-shadow:0 10px 30px rgba(2,6,23,0.06)}</style>
</head>
<body class="bg-teal-50 font-sans">
  <header class="bg-teal-700 text-white py-3 mb-6"><div class="max-w-5xl mx-auto px-4 flex items-center justify-between"><div class="font-semibold">Sets</div><a href="index.html" class="text-white/90">Back</a></div></header>

  <main class="max-w-5xl mx-auto px-4 space-y-6">
    <section class="card"><h2 class="text-lg font-semibold">Basics</h2><div class="mt-2 text-gray-700">Union (A ∪ B), intersection (A ∩ B), complement, subset notation. Use Venn diagrams to visualize.</div></section>

    <section class="card">
      <h2 class="text-lg font-semibold">Venn Diagram</h2>
      <div class="mt-3 text-sm text-gray-700">Example with A={1,2,3}, B={2,3,4}.</div>
      <div class="mt-4 flex justify-center">
        <svg width="320" height="120" xmlns="http://www.w3.org/2000/svg">
          <circle cx="120" cy="60" r="44" fill="#bfdbfe" fill-opacity="0.6" stroke="#2563eb"/>
          <circle cx="200" cy="60" r="44" fill="#fbcfe8" fill-opacity="0.6" stroke="#be185d"/>
          <text x="92" y="60" font-size="11" fill="#063970">1</text>
          <text x="148" y="60" font-size="11" fill="#063970">2,3</text>
          <text x="232" y="60" font-size="11" fill="#6b0b3a">4</text>
        </svg>
      </div>
    </section>

    <section class="card">
      <h2 class="text-lg font-semibold">Practice</h2>
      <div class="grid md:grid-cols-2 gap-4 mt-3">
        <div class="p-3 bg-gray-50 rounded"><div class="font-medium">1) A ∪ B ? (A={1,2,3},B={2,3,4})</div><input id="s1" class="mt-2 p-2 border rounded w-full" placeholder="e.g., 1,2,3,4"><div class="mt-2 flex gap-2"><button id="sc1" class="px-3 py-1 bg-teal-700 text-white rounded">Check</button><button id="sh1" class="px-3 py-1 border rounded">Hint</button></div><div id="sfb1" class="mt-2 text-sm"></div></div>

        <div class="p-3 bg-gray-50 rounded"><div class="font-medium">2) A ∩ B ?</div><input id="s2" class="mt-2 p-2 border rounded w-full" placeholder="e.g., 2,3"><div class="mt-2 flex gap-2"><button id="sc2" class="px-3 py-1 bg-teal-700 text-white rounded">Check</button><button id="sh2" class="px-3 py-1 border rounded">Hint</button></div><div id="sfb2" class="mt-2 text-sm"></div></div>
      </div>
    </section>

    <div class="text-right"><button id="sQuiz" class="bg-teal-700 text-white px-4 py-2 rounded">Quiz</button></div>
  </main>

  <div id="sModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-center justify-center"><div class="bg-white rounded p-6 max-w-md w-full"><div id="sContent"></div><div class="mt-4 text-right"><button id="sClose" class="px-3 py-1 border rounded">Close</button></div></div></div>

  <script>
    function norm(s){return (s||'').toString().trim().replace(/[^0-9,{}\s]/g,'');}
    document.getElementById('sc1').addEventListener('click', ()=>{ const v=norm(document.getElementById('s1').value); const fb=document.getElementById('sfb1'); if(v.includes('1')&&v.includes('4')) fb.innerHTML='<span style="color:#16a34a">Correct — {1,2,3,4}</span>'; else fb.innerHTML='<span style="color:#e11d48">Try again — union contains all unique elements</span>'; });
    document.getElementById('sh1').addEventListener('click', ()=> alert('Hint: include elements from both sets, without repeats'));
    document.getElementById('sc2').addEventListener('click', ()=>{ const v=norm(document.getElementById('s2').value); const fb=document.getElementById('sfb2'); if(v.includes('2')&&v.includes('3')) fb.innerHTML='<span style="color:#16a34a">Correct — {2,3}</span>'; else fb.innerHTML='<span style="color:#e11d48">Try again — intersection are elements in both sets</span>'; });
    document.getElementById('sh2').addEventListener('click', ()=> alert('Hint: which numbers appear in both A and B?'));

    const pool=[{q:'If A={1,2}, B={2,3} → A∪B = ?', a:['1,2,3']},{q:'A∩B = ?', a:['2']}];
    function show(){ let i=0,score=0; const modal=document.getElementById('sModal'); const content=document.getElementById('sContent'); modal.classList.remove('hidden'); function next(){ if(i>=pool.length){ content.innerHTML=`<div class="font-bold">Done</div><div>Score: ${score}/${pool.length}</div>`; return; } const cur=pool[i]; content.innerHTML=`<div class="font-semibold">${cur.q}</div><input id="qa" class="mt-3 p-2 border rounded w-full"><div class="mt-3"><button id="subq" class="px-3 py-1 bg-teal-700 text-white rounded">Submit</button></div><div id="qfb" class="mt-2"></div>`; document.getElementById('subq').onclick=()=>{ const a=(document.getElementById('qa').value||'').trim(); if(cur.a.includes(a)) { score++; document.getElementById('qfb').innerHTML='<span style="color:#16a34a">Correct</span>'; } else document.getElementById('qfb').innerHTML=`<span style="color:#e11d48">Wrong — ${cur.a[0]}</span>`; i++; setTimeout(next,700); }; }
    next(); }
    document.getElementById('sQuiz').addEventListener('click', show);
    document.getElementById('sClose').addEventListener('click', ()=> document.getElementById('sModal').classList.add('hidden'));
  </script>
<!-- Topic Quiz System -->
<script src="/js/topic-quiz-loader.js"></script>
<script src="/js/topic-quiz-injector.js"></script>
</body>
</html>
