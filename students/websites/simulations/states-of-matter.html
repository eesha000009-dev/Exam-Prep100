<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>States of Matter Simulation</title>
    <link rel="stylesheet" href="../src/design-system.css">
    <style>
        body { background: var(--background); color: var(--text); font-family: var(--font-main); margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .sim-main { width: 100%; max-width: 900px; margin: 60px auto 40px auto; padding: 0 16px; }
        .sim-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 40px 32px 32px 32px; margin: 0 auto; }
        .sim-title { font-size: 2.1rem; font-weight: 900; color: #2563eb; margin-bottom: 18px; text-align: center; letter-spacing: -1px; }
        .sim-description { text-align: center; color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 2rem; }
        .sim-btn { background: #2563eb; color: #fff; border: none; border-radius: 6px; padding: 0.6rem 1.2rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 2rem; }
        .sim-btn:hover { background: #1e40af; }
        @media (max-width: 700px) { .sim-main { margin: 32px auto 24px auto; } .sim-card { padding: 24px 8px 20px 8px; } }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" style="background: #fff; box-shadow: var(--shadow);">
        <div class="nav-container" style="display: flex; align-items: center; justify-content: space-between; max-width: 1100px; margin: 0 auto; padding: 0.7rem 1.2rem;">
            <div class="nav-left" style="display: flex; gap: 0.7rem;">
                <button class="nav-btn" onclick="window.location.href='index.html'" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 1.08rem; background: #f1f5f9; color: #2563eb; border: none; border-radius: 8px; padding: 0.6rem 1.3rem; box-shadow: 0 2px 8px #2563eb22;">
                    <span style="font-size:1.3rem;display:flex;align-items:center;">
                        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M9 21V9h6v12"/></svg>
                    </span>
                    Home
                </button>
                <button class="nav-btn" onclick="window.location.href='physics.html'" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 1.08rem; background: #f1f5f9; color: #2563eb; border: none; border-radius: 8px; padding: 0.6rem 1.3rem; transition: background 0.2s;">
                    <span style="font-size:1.3rem;display:flex;align-items:center;">
                        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M11 7v4l3 3"/></svg>
                    </span>
                    Physics
                </button>
                <button class="nav-btn" onclick="window.location.href='chemistry.html'" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 1.08rem; background: #f1f5f9; color: #2563eb; border: none; border-radius: 8px; padding: 0.6rem 1.3rem; transition: background 0.2s;">
                    <span style="font-size:1.3rem;display:flex;align-items:center;">
                        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M7 11h8"/><path d="M11 7v8"/></svg>
                    </span>
                    Chemistry
                </button>
                <button class="nav-btn" disabled style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 1.08rem; background: #f1f5f9; color: #94a3b8; border: none; border-radius: 8px; padding: 0.6rem 1.3rem; opacity:0.6;">
                    <span style="font-size:1.3rem;display:flex;align-items:center;">
                        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="11" cy="11" rx="8" ry="6"/><path d="M11 5v12"/></svg>
                    </span>
                    Biology
                </button>
            </div>
        </div>
    </nav>
    <main class="sim-main">
        <div class="sim-card">
            <h1 class="sim-title">States of Matter</h1>
            <div class="sim-description">Explore the different states of matter and their properties.</div>
            <iframe src="https://phet.colorado.edu/sims/html/states-of-matter/latest/states-of-matter_en.html" width="100%" height="500" style="border-radius: 12px; border: 1px solid #e5e7eb; box-shadow: var(--shadow);" allowfullscreen></iframe>
<p style="font-size:0.9rem; margin-top:0.5rem; text-align:center;">Simulation by <a href="https://phet.colorado.edu">Phet Interactive Simulations, University of Colorado Boulder</a>, licensed under CC-BY-4.0.</p>
            <div style="text-align:center;">
                <button class="sim-btn" onclick="window.location.href='physics.html'">Back to Physics Topics</button>
            </div>
        </div>
    </main>
</body>
</html>
