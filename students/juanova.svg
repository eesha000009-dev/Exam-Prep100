<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="100%" height="100%" fill="none"/>

  <!-- Head -->
  <ellipse cx="200" cy="120" rx="55" ry="45" fill="url(#headGradient)"/>
  <defs>
    <linearGradient id="headGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0098FF"/>
      <stop offset="100%" stop-color="#004F9E"/>
    </linearGradient>
  </defs>

  <!-- Body -->
  <ellipse cx="200" cy="230" rx="65" ry="80" fill="url(#bodyGradient)"/>
  <linearGradient id="bodyGradient" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#007BFF"/>
    <stop offset="100%" stop-color="#003C85"/>
  </linearGradient>

  <!-- Wings -->
  <path d="M135 190 C90 150, 60 180, 125 205" fill="#00BFFF" stroke="#FF7A00" stroke-width="5"/>
  <path d="M265 190 C310 150, 340 180, 275 205" fill="#00BFFF" stroke="#FF7A00" stroke-width="5"/>

  <!-- Eyes -->
  <circle cx="185" cy="110" r="15" fill="white"/>
  <circle cx="215" cy="110" r="15" fill="white"/>
  <circle cx="185" cy="110" r="7" fill="#003C85"/>
  <circle cx="215" cy="110" r="7" fill="#003C85"/>

  <!-- Smile -->
  <path d="M180 135 Q200 150 220 135" stroke="white" stroke-width="3" fill="transparent"/>

  <!-- Text -->
  <text x="200" y="330" font-size="36" text-anchor="middle" fill="#004F9E" font-family="Arial Black">JUANOVA</text>
  <text x="200" y="360" font-size="18" text-anchor="middle" fill="#007BFF" font-family="Arial">CORTEX</text>
  <text x="200" y="380" font-size="12" text-anchor="middle" fill="#FF7A00" font-family="Arial">Your No 1 Tutor App</text>

  <!-- Africa Silhouette -->
  <path d="M190 250 C170 220, 180 200, 200 210 C210 230, 220 250, 200 270 Z" fill="#003C85" opacity="0.7"/>
</svg>
