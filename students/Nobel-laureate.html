      <div class="text-sm text-slate-500 border-t pt-4"><div class="mb-2">Account</div><div class="flex items-center gap-3"><img id="avatar-sm" src="../assets/images/unnamed.jpg" alt="avatar" class="h-10 w-10 rounded-full border"><div><div id="userName" class="font-semibold">Student</div><div id="userLevel" class="text-xs text-slate-400"></div></div></div></div>

  <script type="module">
    import { config } from '../js/config.js';
    import { initSupabase } from '../js/supabase-client.js';
    const supabase = initSupabase(config.supabase.url, config.supabase.anonKey);
    function setText(id, text) { const el = document.getElementById(id); if (el) el.textContent = text; }
    function setImage(id, url) { const el = document.getElementById(id); if (el) el.src = url; }
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('main-content');
    const toggleBtn = document.getElementById('toggleSidebar');
    const marginClasses = ['ml-64', 'md:ml-72', 'lg:ml-80'];
    if (window.innerWidth < 1024) { sidebar.classList.add('hide'); mainContent.classList.remove(...marginClasses); } else { sidebar.classList.remove('hide'); mainContent.classList.add(...marginClasses); }
    if (toggleBtn) toggleBtn.addEventListener('click', (e) => { e.stopPropagation(); sidebar.classList.toggle('hide'); if (sidebar.classList.contains('hide')) { mainContent.classList.remove(...marginClasses); } else { mainContent.classList.add(...marginClasses); } });
    let lastIsDesktop = window.innerWidth >= 1024;
    window.addEventListener('resize', () => { const isDesktop = window.innerWidth >= 1024; if (isDesktop !== lastIsDesktop) { lastIsDesktop = isDesktop; if (isDesktop) { sidebar.classList.remove('hide'); mainContent.classList.add(...marginClasses); } else { sidebar.classList.add('hide'); mainContent.classList.remove(...marginClasses); } } });
    supabase.auth.onAuthStateChange(async (event, session) => {
      // Robust personalization logic
      function updateUserUI(user) {
        if (!user) return;
        const displayName = user.displayName || user.full_name || user.name || user.email?.split('@')[0] || 'Student';
        setText('userName', displayName.split(' ')[0]);
        setText('topName', displayName);
        if (user.avatar_url) {
          setImage('avatar-sm', user.avatar_url);
          setImage('topAvatar', user.avatar_url);
        }
        if (user.level) {
          setText('userLevel', user.level);
          setText('topLevel', user.level);
        }
      }

      function getUserData() {
        if (window.preloadedUserData) return window.preloadedUserData;
        try {
          const cachedCurrent = localStorage.getItem('cachedUserData_current');
          if (cachedCurrent) {
            const parsed = JSON.parse(cachedCurrent);
            if (parsed.data) return parsed.data;
            return parsed;
          }
        } catch {}
        try {
          const cached = localStorage.getItem('userData');
          if (cached) return JSON.parse(cached);
        } catch {}
        return null;
      }

      function tryUpdateUserUI(retries = 10) {
        const user = getUserData();
        if (user) updateUserUI(user);
        else if (retries > 0) setTimeout(() => tryUpdateUserUI(retries - 1), 300);
      }

      tryUpdateUserUI();
      window.addEventListener('userDataUpdated', () => tryUpdateUserUI(1));

      // Fallback: handle session and profile
      if (session && session.user) {
        if (!session.user.email_confirmed_at) {
          alert('Please verify your email first.');
          await supabase.auth.signOut();
          window.location.href = '../general/login-new.html';
          return;
        }
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
        if (profile) updateUserUI({ ...profile, email: session.user.email });
      } else {
        window.location.href = '../general/login-new.html';
      }
    });
  </script>
  <!-- Immediate apply for preloaded/cached user data -->
  <script>
    (function applyPreloaded() {
      function getData() {
        if (window.preloadedUserData) return window.preloadedUserData;
        try { const raw = localStorage.getItem('cachedUserData_current'); if (raw) { const parsed = JSON.parse(raw); if (parsed.data) return parsed.data; return parsed; } } catch (e) {}
        try { const raw2 = localStorage.getItem('userProfile') || localStorage.getItem('userData') || localStorage.getItem('user'); if (raw2) return JSON.parse(raw2); } catch (e) {}
        return null;
      }
      try {
        const u = getData();
        console.debug('Nobel applyPreloaded: found user', u);
        if (!u) return;
        const displayName = u.displayName || u.full_name || u.name || (u.email || '').split('@')[0] || 'Student';
        const shortName = String(displayName).split(' ')[0] || displayName;
        const avatar = u.photoURL || u.avatar_url || (u.profile && u.profile.avatar_url) || `https://ui-avatars.com/api/?name=${encodeURIComponent(shortName)}&background=2563eb&color=fff&size=128`;
        const userNameEl = document.getElementById('userName'); if (userNameEl) userNameEl.textContent = shortName;
        const topNameEl = document.getElementById('topName'); if (topNameEl) topNameEl.textContent = displayName;
        const avatarSm = document.getElementById('avatar-sm'); if (avatarSm) avatarSm.src = avatar;
        const topAvatar = document.getElementById('topAvatar'); if (topAvatar) topAvatar.src = avatar;
        if (u.level) { const userLevelEl = document.getElementById('userLevel'); if (userLevelEl) userLevelEl.textContent = u.level; const topLevelEl = document.getElementById('topLevel'); if (topLevelEl) topLevelEl.textContent = u.level; }
      } catch (err) { console.debug('Nobel applyPreloaded error', err); }
    })();
  </script>
