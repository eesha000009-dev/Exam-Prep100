<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Page - JUANOVA CORTEX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50">
  <!-- Main content area -->
  <div id="main-content" class="flex-1 flex flex-col ml-64 md:ml-72 lg:ml-80">
    <!-- Topbar -->
    <header class="flex items-center justify-between p-4 bg-white border-b border-slate-200">
      <div class="flex items-center gap-3">
        <button id="toggleSidebar" class="p-2 rounded-md hover:bg-slate-100 lg:hidden" title="Toggle sidebar">
          <i class="fas fa-bars"></i>
        </button>
        <div class="relative">
          <input id="globalSearch" type="search" placeholder="Search..." class="w-[520px] hidden md:inline-block pl-10 pr-4 py-2 rounded-full border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-sky-100">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <div class="relative">
          <button id="notifBtn" class="p-2 rounded-full hover:bg-slate-50" aria-label="Notifications">
            <i class="fas fa-bell text-sky-600"></i>
          </button>
          <span id="notifCount" class="absolute -top-1 -right-1 bg-pink-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center">0</span>
        </div>
        <div class="flex items-center gap-3">
          <div class="text-right mr-2">
            <div id="topName" class="font-semibold">Student Name</div>
            <div id="topLevel" class="text-xs text-slate-400">SS 3</div>
          </div>
          <img id="topAvatar" src="/assets/images/unnamed.jpg" alt="avatar" class="h-10 w-10 rounded-full border-2">
        </div>
      </div>
    </header>

    <!-- Page Content Goes Here -->
    <main class="p-6">
      <!-- Content will be inserted here -->
    </main>
  </div>

  <!-- Chatbot Widget -->
  <div id="cortex-ai-chat-button" role="button" aria-label="Open Cortex AI chat">
    <img src="../cortex-owl-brain.svg" alt="Cortex AI" class="cortex-icon" style="width:72px;height:72px;box-shadow:0 4px 16px rgba(0,0,0,0.20);border-radius:16px;transition:transform 0.18s cubic-bezier(.4,2,.6,1),box-shadow 0.18s;cursor:pointer;" onmouseover="this.style.transform='scale(1.12)';this.style.boxShadow='0 8px 32px rgba(0,0,0,0.28)';" onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 16px rgba(0,0,0,0.20)';" onmousedown="this.style.transform='scale(0.96)';" onmouseup="this.style.transform='scale(1.12)';" />
  </div>
  <iframe id="cortex-ai-chat-popup" src="https://app.edcafe.ai/chatbots/68b96ebb2a5be310497b6a0b"></iframe>

  <!-- Scripts -->
  <script type="module">
    import { config } from '../js/config.js';
    import { initSupabase } from '../js/supabase-client.js';
    
    // Initialize Supabase client
    const supabase = initSupabase(config.supabase.url, config.supabase.anonKey);

    // Check authentication state
    supabase.auth.onAuthStateChange((event, session) => {
      if (!session || !session.user) {
        window.location.href = '../general/login-new.html';
        return;
      }

      // Verify email confirmation
      if (!session.user.email_confirmed_at) {
        alert('Please verify your email first. Check your inbox for the verification link.');
        supabase.auth.signOut();
        window.location.href = '../general/login-new.html';
        return;
      }
    });

    // Chat widget logic
    const button = document.getElementById("cortex-ai-chat-button");
    const popup = document.getElementById("cortex-ai-chat-popup");
    
    if (button && popup) {
      button.addEventListener("click", () => {
        popup.style.display = popup.style.display === "none" || popup.style.display === "" ? "block" : "none";
      });
    }
  </script>

  <!-- Import shared student page components -->
  <script type="module" src="./js/student-page-shared.js"></script>
  <script type="module" src="./js/sidebar-fragment.js"></script>

  <style>
    #cortex-ai-chat-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0;
      border: none;
      z-index: 1000;
    }

    #cortex-ai-chat-popup {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 380px;
      height: 500px;
      border: none;
      border-radius: 12px;
      box-shadow: 0px 4px 16px rgba(0,0,0,0.4);
      display: none;
      z-index: 1000;
    }
  </style>
</body>
</html>
