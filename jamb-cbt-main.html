<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMB CBT Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>JAMB Computer Based Test Interface</h1>
    </header>
    <main>
        <section id="exam-interface">
            <h2>Take Your Exam</h2>
            <form id="exam-form">
                <div class="question">
                    <h3>Question 1: What is the capital of Nigeria?</h3>
                    <input type="radio" name="q1" value="A"> A. Lagos<br>
                    <input type="radio" name="q1" value="B"> B. Abuja<br>
                    <input type="radio" name="q1" value="C"> C. Port Harcourt<br>
                </div>
                <div class="question">
                    <h3>Question 2: What is 2 + 2?</h3>
                    <input type="radio" name="q2" value="A"> A. 3<br>
                    <input type="radio" name="q2" value="B"> B. 4<br>
                    <input type="radio" name="q2" value="C"> C. 5<br>
                </div>
                <button type="submit">Submit Exam</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 JAMB CBT Interface</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
