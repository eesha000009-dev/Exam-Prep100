<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
  <style>
    .bg { fill: #ffffff; }
    .axis { stroke: #444; stroke-width: 1; }
    .grid { stroke: #f0f4f8; }
    .parabola { fill: none; stroke: #0ea5a4; stroke-width: 3; }
    .line { fill: none; stroke: #1e3a8a; stroke-width: 3; stroke-dasharray: 4 2; }
    .point { fill: #b91c1c; stroke: #fff; stroke-width: 1; }
    .label { fill: #111827; font-family: Arial, sans-serif; font-size: 14px; }
    .caption { fill: #374151; font-family: Arial, sans-serif; font-size: 12px; }
  </style>

  <rect width="100%" height="100%" class="bg"/>

  <!-- main plotting area -->
  <g transform="translate(40,20)">
    <rect x="0" y="0" width="620" height="300" fill="#fbfdff" stroke="#e6eef8"/>
    <g stroke="#f3f7fb">
      <!-- vertical grid lines -->
      <line x1="60" y1="0" x2="60" y2="300"/>
      <line x1="120" y1="0" x2="120" y2="300"/>
      <line x1="180" y1="0" x2="180" y2="300"/>
      <line x1="240" y1="0" x2="240" y2="300"/>
      <line x1="300" y1="0" x2="300" y2="300"/>
      <line x1="360" y1="0" x2="360" y2="300"/>
      <line x1="420" y1="0" x2="420" y2="300"/>
      <line x1="480" y1="0" x2="480" y2="300"/>
      <line x1="540" y1="0" x2="540" y2="300"/>
    </g>

    <!-- axes -->
    <line x1="0" y1="150" x2="620" y2="150" class="axis"/>
    <line x1="310" y1="0" x2="310" y2="300" class="axis"/>

    <!-- parabola -->
    <path d="M0,220 C120,40 200,20 310,160 C420,300 540,280 620,200" class="parabola"/>

    <!-- straight line -->
    <line x1="40" y1="260" x2="580" y2="60" class="line"/>

    <!-- intersection markers -->
    <circle cx="150" cy="170" r="5" class="point"/>
    <circle cx="420" cy="110" r="5" class="point"/>

    <text x="10" y="16" class="label">Parabola and Line Intersection</text>
    <text x="10" y="36" class="caption">The points where the line crosses the parabola are the solutions to the system</text>

    <text x="140" y="190" class="caption">(x1, y1)</text>
    <text x="410" y="90" class="caption">(x2, y2)</text>
  </g>
</svg>