<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Modular Arithmetic — Congruences</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>.card{background:#fff;padding:1rem;border-radius:10px;box-shadow:0 10px 30px rgba(2,6,23,0.06)}</style>
</head>
<body class="bg-teal-50 font-sans">
  <header class="bg-teal-700 text-white py-3 mb-6"><div class="max-w-5xl mx-auto px-4 flex items-center justify-between"><div class="font-semibold">Modular Arithmetic</div><a href="index.html" class="text-white/90">Back</a></div></header>

  <main class="max-w-5xl mx-auto px-4 space-y-6">
    <section class="card"><h2 class="text-lg font-semibold">Idea</h2><div class="mt-2 text-gray-700">a ≡ b (mod n) means n divides (a-b). Remainders wrap around — think of a clock.</div></section>

    <section class="card">
      <h2 class="text-lg font-semibold">Clock visual (mod 12)</h2>
      <div class="mt-3 flex justify-center">
        <svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <circle cx="110" cy="110" r="100" fill="#dcfce7" stroke="#16a34a"/>
          <text x="110" y="40" font-size="12" text-anchor="middle">0/12</text>
          <text x="190" y="115" font-size="12" text-anchor="middle">3</text>
          <text x="110" y="190" font-size="12" text-anchor="middle">6</text>
          <text x="30" y="115" font-size="12" text-anchor="middle">9</text>
        </svg>
      </div>
    </section>

    <section class="card">
      <h2 class="text-lg font-semibold">Practice</h2>
      <div class="grid md:grid-cols-2 gap-4 mt-3">
        <div class="p-3 bg-gray-50 rounded"><div class="font-medium">1) 15 ≡ ? (mod 4)</div><input id="m1" class="mt-2 p-2 border rounded w-full" placeholder="e.g., 3"><div class="mt-2 flex gap-2"><button id="mc1" class="px-3 py-1 bg-teal-700 text-white rounded">Check</button><button id="mh1" class="px-3 py-1 border rounded">Hint</button></div><div id="mfb1" class="mt-2 text-sm"></div></div>

        <div class="p-3 bg-gray-50 rounded"><div class="font-medium">2) (3+9) mod 5 = ?</div><input id="m2" class="mt-2 p-2 border rounded w-full" placeholder="e.g., 2"><div class="mt-2 flex gap-2"><button id="mc2" class="px-3 py-1 bg-teal-700 text-white rounded">Check</button><button id="mh2" class="px-3 py-1 border rounded">Hint</button></div><div id="mfb2" class="mt-2 text-sm"></div></div>
      </div>
    </section>

    <div class="text-right"><button id="mQuiz" class="bg-teal-700 text-white px-4 py-2 rounded">Mini Quiz</button></div>
  </main>

  <div id="mModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-center justify-center"><div class="bg-white rounded p-6 max-w-md w-full"><div id="mContent"></div><div class="mt-4 text-right"><button id="mClose" class="px-3 py-1 border rounded">Close</button></div></div></div>

  <script>
    function norm(s){return (s||'').toString().trim().replace(/[^0-9\-]/g,'');}
    document.getElementById('mc1').addEventListener('click', ()=>{ const v=parseInt(norm(document.getElementById('m1').value)); const fb=document.getElementById('mfb1'); if(v===3) fb.innerHTML='<span style="color:#16a34a">Correct — 15 ≡ 3 (mod 4)</span>'; else fb.innerHTML='<span style="color:#e11d48">Try again — divide 15 by 4 and find remainder</span>'; });
    document.getElementById('mh1').addEventListener('click', ()=> alert('Hint: 4×3 = 12, 15−12 = 3'));
    document.getElementById('mc2').addEventListener('click', ()=>{ const v=parseInt(norm(document.getElementById('m2').value)); const fb=document.getElementById('mfb2'); if(v===2) fb.innerHTML='<span style="color:#16a34a">Correct — 12 ≡ 2 (mod 5)</span>'; else fb.innerHTML='<span style="color:#e11d48">Try: (3+9)=12, 12 mod 5 = 2</span>'; });
    document.getElementById('mh2').addEventListener('click', ()=> alert('Hint: add, then divide by 5'));

    const pool=[{q:'7^3 mod 10 = ?', a:['3']},{q:'20 mod 6 = ?', a:['2']}];
    function show(){ let i=0,score=0; const modal=document.getElementById('mModal'); const content=document.getElementById('mContent'); modal.classList.remove('hidden'); function next(){ if(i>=pool.length){ content.innerHTML=`<div class="font-bold">Done</div><div>Score: ${score}/${pool.length}</div>`; return; } const cur=pool[i]; content.innerHTML=`<div class="font-semibold">${cur.q}</div><input id="qa" class="mt-3 p-2 border rounded w-full"><div class="mt-3"><button id="subq" class="px-3 py-1 bg-teal-700 text-white rounded">Submit</button></div><div id="qfb" class="mt-2"></div>`; document.getElementById('subq').onclick=()=>{ const a=(document.getElementById('qa').value||'').trim(); if(cur.a.includes(a)) { score++; document.getElementById('qfb').innerHTML='<span style="color:#16a34a">Correct</span>'; } else document.getElementById('qfb').innerHTML=`<span style="color:#e11d48">Wrong — ${cur.a[0]}</span>`; i++; setTimeout(next,700); }; }
    next(); }
    document.getElementById('mQuiz').addEventListener('click', show);
    document.getElementById('mClose').addEventListener('click', ()=> document.getElementById('mModal').classList.add('hidden'));
  </script>
<!-- Topic Quiz System -->
<script src="/js/topic-quiz-loader.js"></script>
<script src="/js/topic-quiz-injector.js"></script>
</body>
</html>
