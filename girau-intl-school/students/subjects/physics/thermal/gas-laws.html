            z-index: 40;
        }

            height: 500px;
            overflow: hidden;
            border-radius: 8px;
            background: #f9fafb;
        }

            width: 100%;
            height: 100%;
            border: none;
        }

            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #f9fafb;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .desktop-sidebar { display: none; }
            .mobile-sidebar {
                position: fixed;
                top: 0; left: -280px;
                width: 280px;
                height: 100%;
                background: white;
                z-index: 50;
                transition: left 0.3s ease;
                overflow-y: auto;
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            }
            .mobile-sidebar.show { left: 0; }
            .simulation-container { height: 300px; }
        }

        .section-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
        }

        .intro-text {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            border-left: 4px solid #10b981;
            padding: 1rem 1.25rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 1.5rem;

        .intro-text p {

            font-size: 1rem;

        .formula-box {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 2px solid #3b82f6;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e40af;
        }

        .coming-soon-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 9999px;
            margin-left: 8px;
            text-transform: uppercase;
            font-weight: 600;
            animation: pulse 2s infinite;
            white-space: nowrap;
            display: inline-block;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }

        .click-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #9ca3af;
            font-size: 0.875rem;
            font-weight: 400;
            cursor: pointer;
            margin-top: 16px;

            border: 2px solid #f59e0b;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

            color: #92400e;
            font-weight: 700;

                    chunks: [
                        {
                            intro: "Before we dive into the gas laws, let's understand what makes gases unique compared to solids and liquids. Gases behave differently because their particles are far apart and move freely.",
                            content: `
                                <div class="section-card">
                                    <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                                        <i class="fas fa-wind text-green-500 mr-3"></i>Properties of Gases
                                    </h3>
                                    <p class="text-gray-700 leading-relaxed mb-4">Gases have unique properties that distinguish them from solids and liquids. Understanding these properties is essential for grasping the gas laws.</p>
                                    <div class="grid md:grid-cols-2 gap-4">
                                        <div class="bg-green-50 p-4 rounded-lg border-l-4 border-green-500">
                                            <strong class="text-green-700">Compressibility</strong>
                                            <p class="text-gray-700 mt-2">Gases can be easily compressed because there are large spaces between particles. This is why we can store large amounts of gas in small cylinders.</p>

                                        <div class="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-500">
                                            <strong class="text-blue-700">Expansibility</strong>
                                            <p class="text-gray-700 mt-2">Gases expand to fill their container completely. They have no fixed shape or volume.</p>
                                        </div>
                                        <div class="bg-purple-50 p-4 rounded-lg border-l-4 border-purple-500">
                                            <strong class="text-purple-700">Diffusion</strong>
                                            <p class="text-gray-700 mt-2">Gases mix spontaneously with each other. The smell of perfume spreads throughout a room due to diffusion.</p>
                                        </div>
                                        <div class="bg-orange-50 p-4 rounded-lg border-l-4 border-orange-500">
                                            <strong class="text-orange-700">Exert Pressure</strong>
                                            <p class="text-gray-700 mt-2">Gas particles collide with container walls, creating pressure. This is why tires and balloons stay inflated.</p>
                                        </div>
                                    </div>
                                </div>

                        {
                            intro: "To describe the state of a gas, we use three key variables. These are the quantities we'll be working with in all the gas laws.",

                                <div class="section-card">
                                    <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                                        <i class="fas fa-cogs text-green-500 mr-3"></i>State Variables of a Gas
                                    </h3>

                                                <span class="text-red-600 font-bold text-lg">P</span>
                                            </div>
                                            <div>
                                                <h4 class="font-semibold text-gray-800">Pressure (P)</h4>
                                                <p class="text-gray-600">The force exerted by the gas per unit area. Measured in Pascals (Pa) or atmospheres (atm). 1 atm = 101,325 Pa.</p>

                                        </div>
                                        <div class="flex items-start p-4 bg-gray-50 rounded-lg">
                                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mr-4">
                                                <span class="text-blue-600 font-bold text-lg">V</span>
                                            </div>
                                            <div>
                                                <h4 class="font-semibold text-gray-800">Volume (V)</h4>
                                                <p class="text-gray-600">The space occupied by the gas. Measured in cubic meters (m³) or liters (L). 1 m³ = 1000 L.</p>
                                            </div>
                                        </div>
                                        <div class="flex items-start p-4 bg-gray-50 rounded-lg">
                                            <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mr-4">

                                            </div>
                                            <div>
                                                <h4 class="font-semibold text-gray-800">Temperature (T)</h4>
                                                <p class="text-gray-600">Always measured in Kelvin (K) for gas calculations. T(K) = T(°C) + 273.15. Never use Celsius in gas law equations!</p>

                                        </div>
                                    </div>

                    resources: [
                        { type: "video", title: "Introduction to Gases", description: "Understanding gas properties", url: "https://www.youtube.com/embed/GOB1hV_Y8zY" }
                    ],
                    quiz: {

                        options: ["Celsius (°C)", "Fahrenheit (°F)", "Kelvin (K)", "Rankine (°R)"],

                        explanation: "Temperature must always be in Kelvin for gas law calculations because Kelvin starts at absolute zero, where molecular motion stops."

                },
                {
                    id: "boyles-law",
                    title: "Boyle's Law",
                    type: "note",
                    chunks: [
                        {
                            intro: "Our first gas law was discovered by Robert Boyle in 1662. It describes the relationship between pressure and volume when temperature is kept constant.",
                            content: `
                                <div class="section-card">
                                    <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                                        <i class="fas fa-compress-arrows-alt text-green-500 mr-3"></i>Boyle's Law
                                    </h3>
                                    <div class="law-card mb-4">
                                        <h4 class="text-lg mb-2">Statement:</h4>
                                        <p class="text-gray-800">At constant temperature, the pressure of a fixed mass of gas is inversely proportional to its volume.</p>
                                    </div>
                                    <p class="text-gray-700 mb-4">This means if you compress a gas (reduce its volume), its pressure increases. If you let it expand, its pressure decreases.</p>
                                    <div class="formula-box mb-4">
                                        P₁V₁ = P₂V₂ (at constant temperature)
                                    </div>
                                    <div class="bg-yellow-50 p-4 rounded-lg border-l-4 border-yellow-500">
                                        <p class="text-gray-700"><strong>Mathematical Form:</strong> P ∝ 1/V or PV = constant (k)</p>
                                        <p class="text-gray-700 mt-2">This means: P₁V₁ = P₂V₂ = P₃V₃ = ... = constant</p>
                                    </div>
                                </div>
                            `
                        },
                        {
                            intro: "Let's understand Boyle's Law with a molecular explanation and see it in action with a worked example.",
                            content: `

                                    <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                                        <i class="fas fa-atom text-green-500 mr-3"></i>Molecular Explanation
                                    </h3>
                                    <div class="bg-blue-50 p-4 rounded-lg mb-4">
                                        <p class="text-gray-700">When volume decreases, gas particles are forced into a smaller space. This means:</p>
                                        <ul class="list-disc pl-6 mt-2 space-y-1 text-gray-700">
                                            <li>More particles per unit volume</li>
                                            <li>More frequent collisions with walls</li>
                                            <li>Higher pressure</li>
                                        </ul>
                                    </div>
                                    
                                    <h4 class="font-semibold text-gray-800 mb-3">Worked Example:</h4>
                                    <div class="bg-green-50 p-4 rounded-lg border-l-4 border-green-500">
                                        <p class="font-medium mb-3">A gas occupies 2.0 L at a pressure of 1.5 atm. What will be its volume if the pressure is increased to 3.0 atm at constant temperature?</p>
                                        <div class="bg-white p-3 rounded mt-2">

                                            <p>P₁ = 1.5 atm, V₁ = 2.0 L, P₂ = 3.0 atm, V₂ = ?</p>
                                            <p class="mt-2">Using P₁V₁ = P₂V₂:</p>
                                            <p>1.5 × 2.0 = 3.0 × V₂</p>
                                            <p>3.0 = 3.0 × V₂</p>
                                            <p class="font-bold text-green-700">V₂ = 1.0 L</p>
                                        </div>
                                    </div>
                                </div>
                            `

                                </div>
                            `

                        { type: "video", title: "Boyle's Law Explained", description: "Detailed explanation with examples", url: "https://www.youtube.com/embed/N5xwn2vEsp4" }

                    quiz: {
                        question: "A gas has volume 4.0 L at pressure 2 atm. If compressed to 1.0 L at constant temperature, what is the new pressure?",

                        explanation: "Using P₁V₁ = P₂V₂: 2 × 4 = P₂ × 1. Therefore, P₂ = 8 atm. Halving the volume doubles the pressure."
                    }
                },
                {
                    id: "charles-law",
                    title: "Charles's Law",
                    type: "note",
                    chunks: [
                        {
                            intro: "Now let's explore the relationship between volume and temperature, discovered by Jacques Charles in 1787. This law explains why a balloon expands when heated!",
                            content: `
                                <div class="section-card">
                                    <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                                        <i class="fas fa-expand-arrows-alt text-green-500 mr-3"></i>Charles's Law

                                    <div class="law-card mb-4">

                        {

        // Render functions
        function renderStepsList() {
            const stepsList = document.getElementById('stepsList');
            const mobileStepsList = document.getElementById('mobileStepsList');
            
            let html = '';
            topicData.steps.forEach((step, index) => {
                const isActive = index === currentStepIndex;
                const isCompleted = stepsCompleted.includes(index);
                
                html += `
                    <li>
                        <button onclick="goToStep(${index})" class="step-button w-full text-left px-3 py-2 rounded-lg flex items-center ${isActive ? 'active' : 'hover:bg-gray-100'}">
                            <span class="w-6 h-6 rounded-full flex items-center justify-center text-sm mr-3 ${isCompleted ? 'bg-green-500 text-white' : isActive ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-600'}">
                                ${isCompleted ? '✓' : index + 1}
                            </span>
                            <span class="${isActive ? 'font-medium' : ''}">${step.title}</span>
                        </button>
                    </li>
                `;
            });
            
            stepsList.innerHTML = html;
            mobileStepsList.innerHTML = html;
        }

        function renderStepContent() {
            const step = topicData.steps[currentStepIndex];
            const chunk = step.chunks[currentChunkIndex];
            
            let html = '';
            
            if (chunk.intro) {
                html += `<div class="intro-text"><p>${chunk.intro}</p></div>`;
            }
            
            html += chunk.content;
            
            if (currentChunkIndex < step.chunks.length - 1) {
                html += `<div class="click-hint" onclick="nextChunk()"><span>Click to continue</span><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></div>`;
            } else {
                if (step.quiz) {
                    html += `
                        <div class="mt-6 text-center">
                            <button onclick="showQuiz()" class="px-6 py-3 bg-green-500 text-white rounded-lg font-medium hover:bg-green-600 transition-colors">
                                <i class="fas fa-question-circle mr-2"></i>Take Quiz
                            </button>
                        </div>
                    `;
                }
            }
            
            document.getElementById('stepContainer').innerHTML = html;
            
            const progress = ((currentStepIndex + (currentChunkIndex / step.chunks.length)) / topicData.steps.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('progressPercent').textContent = `${Math.round(progress)}%`;
            
            document.getElementById('prevStepBtn').disabled = currentStepIndex === 0 && currentChunkIndex === 0;
            document.getElementById('nextStepBtn').textContent = currentChunkIndex < step.chunks.length - 1 ? 'Continue' : (currentStepIndex < topicData.steps.length - 1 ? 'Next Step' : 'Complete');
        }

        function renderResources() {
            const step = topicData.steps[currentStepIndex];
            const grid = document.getElementById('resourcesGrid');
            
            if (!step.resources || step.resources.length === 0) {
                document.getElementById('resourcesContainer').style.display = 'none';
                return;
            }
            
            document.getElementById('resourcesContainer').style.display = 'block';
            
            let html = '';
            step.resources.forEach(resource => {
                const icon = resource.type === 'video' ? 'fa-video' : resource.type === 'simulation' ? 'fa-flask' : 'fa-file';
                html += `
                    <div class="resource-card bg-gray-50 p-4 rounded-lg border border-gray-200 cursor-pointer" onclick="openResource('${resource.type}', '${resource.title}', '${resource.url}')">
                        <div class="flex items-center mb-2">
                            <i class="fas ${icon} text-green-500 mr-2"></i>
                            <h4 class="font-medium">${resource.title}</h4>
                        </div>
                        <p class="text-sm text-gray-600">${resource.description}</p>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        function showQuiz() {
            const step = topicData.steps[currentStepIndex];
            const quiz = step.quiz;
            
            const html = `
                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-4">Quick Quiz</h3>
                    <p class="text-gray-700 mb-4">${quiz.question}</p>
                    <div class="space-y-3">
                        ${quiz.options.map((option, index) => `
                            <button onclick="checkAnswer(${index}, ${quiz.correct})" class="quiz-option w-full text-left p-4 border-2 border-gray-200 rounded-lg hover:border-green-300 transition-colors">
                                ${String.fromCharCode(65 + index)}. ${option}
                            </button>
                        `).join('')}
                    </div>
                </div>
                <div id="quizFeedback" class="hidden"></div>
            `;
            
            document.getElementById('quizContent').innerHTML = html;
            document.getElementById('quizModal').classList.remove('hidden');
        }

        function checkAnswer(selected, correct) {
            const options = document.querySelectorAll('.quiz-option');
            const step = topicData.steps[currentStepIndex];
            const quiz = step.quiz;
            
            options.forEach((option, index) => {
                option.classList.remove('selected');
                if (index === correct) {
                    option.classList.add('correct');
                } else if (index === selected && selected !== correct) {
                    option.classList.add('incorrect');
                }
            });
            
            const feedback = document.getElementById('quizFeedback');
            feedback.classList.remove('hidden');
            
            if (selected === correct) {
                feedback.innerHTML = `
                    <div class="bg-green-50 border-l-4 border-green-500 p-4 rounded">
                        <p class="font-semibold text-green-700"><i class="fas fa-check-circle mr-2"></i>Correct!</p>
                        <p class="text-gray-700 mt-2">${quiz.explanation}</p>
                    </div>
                `;
                if (!stepsCompleted.includes(currentStepIndex)) {
                    stepsCompleted.push(currentStepIndex);
                }
            } else {
                feedback.innerHTML = `
                    <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded">
                        <p class="font-semibold text-red-700"><i class="fas fa-times-circle mr-2"></i>Incorrect</p>
                        <p class="text-gray-700 mt-2">${quiz.explanation}</p>
                    </div>
                `;
            }
            
            renderStepsList();
        }

        function openResource(type, title, url) {
            const modal = document.getElementById('resourceModal');
            const modalTitle = document.getElementById('resourceModalTitle');
            const modalContent = document.getElementById('resourceModalContent');
            
            modalTitle.textContent = title;
            
            if (type === 'video') {
                modalContent.innerHTML = `<div class="video-container"><iframe src="${url}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
            } else if (type === 'simulation') {
                modalContent.innerHTML = `<div class="simulation-container"><iframe src="${url}"></iframe></div>`;
            }
            
            modal.classList.remove('hidden');
        }

        function goToStep(index) {
            currentStepIndex = index;
            currentChunkIndex = 0;
            renderStepsList();
            renderStepContent();
            renderResources();
            closeMobileSidebar();
        }

        function nextChunk() {
            const step = topicData.steps[currentStepIndex];
            if (currentChunkIndex < step.chunks.length - 1) {
                currentChunkIndex++;
                renderStepContent();
            }
        }

        function nextStep() {
            const step = topicData.steps[currentStepIndex];
            if (currentChunkIndex < step.chunks.length - 1) {
                currentChunkIndex++;
                renderStepContent();
            } else if (currentStepIndex < topicData.steps.length - 1) {
                currentStepIndex++;
                currentChunkIndex = 0;
                renderStepsList();
                renderStepContent();
                renderResources();
            }
        }

        function prevStep() {
            if (currentChunkIndex > 0) {
                currentChunkIndex--;
                renderStepContent();
            } else if (currentStepIndex > 0) {
                currentStepIndex--;
                currentChunkIndex = 0;
                renderStepsList();
                renderStepContent();
                renderResources();
            }
        }

        function closeMobileSidebar() {
            document.getElementById('mobileSidebar').classList.remove('show');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }

        document.getElementById('nextStepBtn').addEventListener('click', nextStep);
        document.getElementById('prevStepBtn').addEventListener('click', prevStep);
        document.getElementById('closeResourceModal').addEventListener('click', () => {
            document.getElementById('resourceModal').classList.add('hidden');
        });
        document.getElementById('quizModal').addEventListener('click', (e) => {
            if (e.target.id === 'quizModal') {
                document.getElementById('quizModal').classList.add('hidden');
            }
        });

        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            document.getElementById('mobileSidebar').classList.add('show');
            document.getElementById('sidebarOverlay').classList.add('show');
        });
        document.getElementById('closeSidebarBtn').addEventListener('click', closeMobileSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeMobileSidebar);

        renderStepsList();
        renderStepContent();
        renderResources();
    </script>
