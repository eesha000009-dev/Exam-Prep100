        // Render functions
        function renderStepsList() {
            const stepsList = document.getElementById('stepsList');
            const mobileStepsList = document.getElementById('mobileStepsList');
            
            let html = '';
            topicData.steps.forEach((step, index) => {
                const isActive = index === currentStepIndex;
                const isCompleted = stepsCompleted.includes(index);
                
                html += `
                    <li>
                        <button onclick="goToStep(${index})" class="step-button w-full text-left px-3 py-2 rounded-lg flex items-center ${isActive ? 'active' : 'hover:bg-gray-100'}">
                            <span class="w-6 h-6 rounded-full flex items-center justify-center text-sm mr-3 ${isCompleted ? 'bg-green-500 text-white' : isActive ? 'bg-orange-500 text-white' : 'bg-gray-200 text-gray-600'}">
                                ${isCompleted ? '✓' : index + 1}
                            </span>
                            <span class="${isActive ? 'font-medium' : ''}">${step.title}</span>
                        </button>
                    </li>
                `;
            });
            
            stepsList.innerHTML = html;
            mobileStepsList.innerHTML = html;
        }

        function renderStepContent() {
            const step = topicData.steps[currentStepIndex];
            const chunk = step.chunks[currentChunkIndex];
            
            let html = '';
            
            // Intro text
            if (chunk.intro) {
                html += `<div class="intro-text"><p>${chunk.intro}</p></div>`;
            }
            
            // Content
            html += chunk.content;
            
            // Click hint for chunks
            if (currentChunkIndex < step.chunks.length - 1) {
                html += `<div class="click-hint" onclick="nextChunk()"><span>Click to continue</span><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></div>`;
            } else {
                // Quiz button for last chunk
                if (step.quiz) {
                    html += `
                        <div class="mt-6 text-center">
                            <button onclick="showQuiz()" class="px-6 py-3 bg-orange-500 text-white rounded-lg font-medium hover:bg-orange-600 transition-colors">
                                <i class="fas fa-question-circle mr-2"></i>Take Quiz
                            </button>
                        </div>
                    `;
                }
            }
            
            document.getElementById('stepContainer').innerHTML = html;
            
            // Update progress
            const progress = ((currentStepIndex + (currentChunkIndex / step.chunks.length)) / topicData.steps.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('progressPercent').textContent = `${Math.round(progress)}%`;
            
            // Update navigation buttons
            document.getElementById('prevStepBtn').disabled = currentStepIndex === 0 && currentChunkIndex === 0;
            document.getElementById('nextStepBtn').textContent = currentChunkIndex < step.chunks.length - 1 ? 'Continue' : (currentStepIndex < topicData.steps.length - 1 ? 'Next Step' : 'Complete');
        }

        function renderResources() {
            const step = topicData.steps[currentStepIndex];
            const grid = document.getElementById('resourcesGrid');
            
            if (!step.resources || step.resources.length === 0) {
                document.getElementById('resourcesContainer').style.display = 'none';
                return;
            }
            
            document.getElementById('resourcesContainer').style.display = 'block';
            
            let html = '';
            step.resources.forEach(resource => {
                const icon = resource.type === 'video' ? 'fa-video' : resource.type === 'simulation' ? 'fa-flask' : 'fa-file';
                html += `
                    <div class="resource-card bg-gray-50 p-4 rounded-lg border border-gray-200 cursor-pointer" onclick="openResource('${resource.type}', '${resource.title}', '${resource.url}')">
                        <div class="flex items-center mb-2">
                            <i class="fas ${icon} text-orange-500 mr-2"></i>
                            <h4 class="font-medium">${resource.title}</h4>
                        </div>
                        <p class="text-sm text-gray-600">${resource.description}</p>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        function showQuiz() {
            const step = topicData.steps[currentStepIndex];
            const quiz = step.quiz;
            
            const html = `
                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-4">Quick Quiz</h3>
                    <p class="text-gray-700 mb-4">${quiz.question}</p>
                    <div class="space-y-3">
                        ${quiz.options.map((option, index) => `
                            <button onclick="checkAnswer(${index}, ${quiz.correct})" class="quiz-option w-full text-left p-4 border-2 border-gray-200 rounded-lg hover:border-orange-300 transition-colors">
                                ${String.fromCharCode(65 + index)}. ${option}
                            </button>
                        `).join('')}
                    </div>
                </div>
                <div id="quizFeedback" class="hidden"></div>
            `;
            
            document.getElementById('quizContent').innerHTML = html;
            document.getElementById('quizModal').classList.remove('hidden');
        }

        function checkAnswer(selected, correct) {
            const options = document.querySelectorAll('.quiz-option');
            const step = topicData.steps[currentStepIndex];
            const quiz = step.quiz;
            
            options.forEach((option, index) => {
                option.classList.remove('selected');
                if (index === correct) {
                    option.classList.add('correct');
                } else if (index === selected && selected !== correct) {
                    option.classList.add('incorrect');
                }
            });
            
            const feedback = document.getElementById('quizFeedback');
            feedback.classList.remove('hidden');
            
            if (selected === correct) {
                feedback.innerHTML = `
                    <div class="bg-green-50 border-l-4 border-green-500 p-4 rounded">
                        <p class="font-semibold text-green-700"><i class="fas fa-check-circle mr-2"></i>Correct!</p>
                        <p class="text-gray-700 mt-2">${quiz.explanation}</p>
                    </div>
                `;
                if (!stepsCompleted.includes(currentStepIndex)) {
                    stepsCompleted.push(currentStepIndex);
                }
            } else {
                feedback.innerHTML = `
                    <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded">
                        <p class="font-semibold text-red-700"><i class="fas fa-times-circle mr-2"></i>Incorrect</p>
                        <p class="text-gray-700 mt-2">${quiz.explanation}</p>
                    </div>
                `;
            }
            
            renderStepsList();
        }

        function openResource(type, title, url) {
            const modal = document.getElementById('resourceModal');
            const modalTitle = document.getElementById('resourceModalTitle');
            const modalContent = document.getElementById('resourceModalContent');
            
            modalTitle.textContent = title;
            
            if (type === 'video') {
                modalContent.innerHTML = `<div class="video-container"><iframe src="${url}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
            } else if (type === 'simulation') {
                modalContent.innerHTML = `<div class="simulation-container"><iframe src="${url}"></iframe></div>`;
            }
            
            modal.classList.remove('hidden');
        }

        // Navigation functions
        function goToStep(index) {
            currentStepIndex = index;
            currentChunkIndex = 0;
            renderStepsList();
            renderStepContent();
            renderResources();
            closeMobileSidebar();
        }

        function nextChunk() {
            const step = topicData.steps[currentStepIndex];
            if (currentChunkIndex < step.chunks.length - 1) {
                currentChunkIndex++;
                renderStepContent();
            }
        }

        function nextStep() {
            const step = topicData.steps[currentStepIndex];
            if (currentChunkIndex < step.chunks.length - 1) {
                currentChunkIndex++;
                renderStepContent();
            } else if (currentStepIndex < topicData.steps.length - 1) {
                currentStepIndex++;
                currentChunkIndex = 0;
                renderStepsList();
                renderStepContent();
                renderResources();
            }
        }

        function prevStep() {
            if (currentChunkIndex > 0) {
                currentChunkIndex--;
                renderStepContent();
            } else if (currentStepIndex > 0) {
                currentStepIndex--;
                currentChunkIndex = 0;
                renderStepsList();
                renderStepContent();
                renderResources();
            }
        }

        function closeMobileSidebar() {
            document.getElementById('mobileSidebar').classList.remove('show');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }

        // Event listeners
        document.getElementById('nextStepBtn').addEventListener('click', nextStep);
        document.getElementById('prevStepBtn').addEventListener('click', prevStep);
        document.getElementById('closeResourceModal').addEventListener('click', () => {
            document.getElementById('resourceModal').classList.add('hidden');
        });
        document.getElementById('quizModal').addEventListener('click', (e) => {
            if (e.target.id === 'quizModal') {
                document.getElementById('quizModal').classList.add('hidden');
            }
        });

        // Mobile menu
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            document.getElementById('mobileSidebar').classList.add('show');
            document.getElementById('sidebarOverlay').classList.add('show');
        });
        document.getElementById('closeSidebarBtn').addEventListener('click', closeMobileSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeMobileSidebar);

        // Initialize
        renderStepsList();
        renderStepContent();
        renderResources();
    </script>
