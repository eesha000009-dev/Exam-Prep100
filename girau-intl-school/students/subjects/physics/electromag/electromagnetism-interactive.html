<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Electromagnetism - Interactive Learning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, system-ui, sans-serif; }
    .step-active { background-color: #2563eb; color: white; }
    .step-inactive { background-color: #e5e7eb; color: #374151; }
    #emCanvas { background: #f8fafc; touch-action: none; }
    .charge { position: absolute; width: 18px; height: 18px; border-radius: 50%; display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff; }
    .positive { background:#ef4444; }
    .negative { background:#3b82f6; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-blue-700 p-4 text-white">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="../index.html">← Back to Physics</a>
      <h1 class="font-bold">Electromagnetism</h1>
    </div>
  </nav>

  <div class="flex">
    <aside class="w-64 bg-white p-4 border-r">
      <h2 class="font-semibold mb-4">Steps</h2>
      <ul id="stepsList" class="space-y-2"></ul>
    </aside>

    <main class="flex-1 p-6">
      <div id="progressBar" class="h-3 bg-gray-200 rounded-full overflow-hidden mb-6"><div id="progress" class="h-full bg-blue-600" style="width:0%"></div></div>

      <div id="stepContent" class="bg-white p-6 rounded shadow min-h-[220px]"></div>

      <section class="mt-6 bg-white p-6 rounded shadow">
        <div class="flex gap-4 mb-4">
          <button id="electricBtn" class="px-4 py-2 bg-blue-600 text-white rounded">Electric Fields</button>
          <button id="magneticBtn" class="px-4 py-2 bg-gray-200 rounded">Magnetic Fields</button>
          <button id="emWaveBtn" class="px-4 py-2 bg-gray-200 rounded">EM Waves</button>
        </div>

        <div class="relative w-full h-[420px] border rounded">
          <canvas id="emCanvas" class="absolute inset-0 w-full h-full"></canvas>
          <div id="charges" class="absolute inset-0 pointer-events-none"></div>
        </div>

        <div class="mt-4 grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm">Charge +/−</label>
            <select id="chargeType" class="w-full p-2 border rounded">
              <option value="+">Positive</option>
              <option value="-">Negative</option>
            </select>
            <button id="addCharge" class="mt-2 px-3 py-2 bg-green-600 text-white rounded">Add Charge</button>
          </div>

          <div>
            <label class="block text-sm">Field Sample Density</label>
            <input id="density" type="range" min="6" max="28" value="14" class="w-full" />
            <div class="text-sm text-gray-600 mt-2">Adjust vectors drawn for field visualization</div>
          </div>
        </div>

        <div class="mt-4 grid grid-cols-3 gap-4 text-center">
          <div class="p-3 bg-blue-50 rounded"><div class="text-sm">Total Charges</div><div id="totalCharges" class="font-bold text-blue-600">0</div></div>
          <div class="p-3 bg-green-50 rounded"><div class="text-sm">Field Strength (sample)</div><div id="fieldSample" class="font-bold text-green-600">0</div></div>
          <div class="p-3 bg-yellow-50 rounded"><div class="text-sm">Energy (qual.)</div><div id="energySample" class="font-bold text-yellow-600">0</div></div>
        </div>
      </section>

      <div class="flex justify-between mt-6">
        <button id="prevBtn" class="px-4 py-2 bg-gray-300 rounded" disabled>Previous</button>
        <button id="nextBtn" class="px-4 py-2 bg-blue-600 text-white rounded">Next</button>
      </div>
    </main>
  </div>

  <div id="quizModal" class="hidden fixed inset-0 bg-black bg-opacity-40 items-center justify-center">
    <div class="bg-white p-6 rounded max-w-lg w-full m-6">
      <h3 class="text-xl font-bold mb-4">Quick Quiz</h3>
      <div id="quizContent"></div>
      <div class="mt-4 flex justify-end gap-2"><button id="closeQuiz" class="px-3 py-2 rounded bg-gray-200">Close</button><button id="submitQuiz" class="px-3 py-2 rounded bg-blue-600 text-white">Submit</button></div>
    </div>
  </div>

  <script>
    const topicData = {
      steps: [
        { title: 'Coulomb\'s Law', content: `<h3 class="text-lg font-bold mb-2">Coulomb's Law</h3><p>F = k q1 q2 / r^2 — describes electrostatic force between point charges.</p>` },
        { title: 'Electric Field', content: `<h3 class="text-lg font-bold mb-2">Electric Field</h3><p>E = F/q — field created by charges, vector quantity.</p>` },
        { title: 'Magnetic Fields &amp; Forces', content: `<h3 class="text-lg font-bold mb-2">Magnetic Effects</h3><p>Moving charges and currents produce magnetic fields; F = q v × B and F = I L × B.</p>` }
      ],
      quiz: [
        { question: 'What is the direction of the electric field produced by a positive point charge?', options: ['Towards the charge','Away from the charge','Clockwise','Counterclockwise'], correct:1},
        { question: 'Which expression gives magnetic force on a moving charge?', options: ['F = q E', 'F = q v × B', 'F = k q1 q2 / r^2', 'F = m a'], correct:1}
      ]
    };

    // Steps UI
    let currentStep = 0; const stepsList = document.getElementById('stepsList');
    function renderSteps(){ stepsList.innerHTML=''; topicData.steps.forEach((s,i)=>{ const li=document.createElement('li'); li.className=`p-2 rounded ${i===currentStep?'step-active':'step-inactive'}`; li.textContent=s.title; li.onclick=()=>showStep(i); stepsList.appendChild(li); }); }
    function showStep(i){ currentStep=i; document.getElementById('stepContent').innerHTML=topicData.steps[i].content; renderSteps(); document.getElementById('prevBtn').disabled = i===0; document.getElementById('nextBtn').disabled = i===topicData.steps.length-1; updateProgress(); }
    function updateProgress(){ const pct = ((currentStep+1)/topicData.steps.length)*100; document.getElementById('progress').style.width = pct+'%'; }

    // Canvas & field visualization
    const canvas = document.getElementById('emCanvas'); const ctx = canvas.getContext('2d'); canvas.width = canvas.offsetWidth; canvas.height = 420;
    const chargesDiv = document.getElementById('charges'); let charges = [];

    function Charge(type,x,y){ this.type=type; this.x=x; this.y=y; this.el=document.createElement('div'); this.el.className='charge '+(type==='+'?'positive':'negative'); this.el.style.left=(x-9)+'px'; this.el.style.top=(y-9)+'px'; this.el.textContent=type; chargesDiv.appendChild(this.el); }

    function clearField(){ ctx.clearRect(0,0,canvas.width,canvas.height); }

    function drawField(){ clearField(); const density = parseInt(document.getElementById('density').value);
      let sampleSum = 0;
      for(let sx=20; sx<canvas.width; sx+=Math.round(canvas.width/density)){
        for(let sy=20; sy<canvas.height; sy+=Math.round(canvas.height/density)){
          let Ex=0, Ey=0;
          for(const c of charges){ const dx=sx-c.x, dy=sy-c.y; const r2 = dx*dx+dy*dy + 9; const inv = 1/Math.sqrt(r2); const strength = (c.type==='+'?1:-1) * inv*inv; Ex += strength*dx*inv; Ey += strength*dy*inv; }
          // draw vector
          const mag = Math.sqrt(Ex*Ex+Ey*Ey);
          sampleSum += mag;
          if(mag>0.002){ const nx = Ex/mag, ny = Ey/mag; ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx + nx*12, sy + ny*12); ctx.strokeStyle = mag>0.08? '#ef4444':'#4b5563'; ctx.lineWidth = 1; ctx.stroke(); }
        }
      }
      document.getElementById('fieldSample').textContent = (sampleSum/100).toFixed(2);
      document.getElementById('totalCharges').textContent = charges.length;
      document.getElementById('energySample').textContent = (charges.length * (sampleSum/200)).toFixed(2);
    }

    // Add charge by button: places near center
    document.getElementById('addCharge').addEventListener('click',()=>{ const rect = canvas.getBoundingClientRect(); const type = document.getElementById('chargeType').value; const x = Math.round(rect.width* (0.25 + Math.random()*0.5)); const y = Math.round(rect.height* (0.25 + Math.random()*0.5)); charges.push(new Charge(type,x,y)); drawField(); });
    document.getElementById('density').addEventListener('input', drawField);

    // Buttons for modes (electric/magnetic/em wave)
    document.getElementById('electricBtn').addEventListener('click', ()=>{ currentMode='electric'; document.getElementById('electricBtn').className='px-4 py-2 bg-blue-600 text-white rounded'; document.getElementById('magneticBtn').className='px-4 py-2 bg-gray-200 rounded'; document.getElementById('emWaveBtn').className='px-4 py-2 bg-gray-200 rounded'; drawField(); });
    document.getElementById('magneticBtn').addEventListener('click', ()=>{ currentMode='magnetic'; document.getElementById('magneticBtn').className='px-4 py-2 bg-blue-600 text-white rounded'; document.getElementById('electricBtn').className='px-4 py-2 bg-gray-200 rounded'; document.getElementById('emWaveBtn').className='px-4 py-2 bg-gray-200 rounded'; drawMagnetic(); });
    document.getElementById('emWaveBtn').addEventListener('click', ()=>{ currentMode='emwave'; document.getElementById('emWaveBtn').className='px-4 py-2 bg-blue-600 text-white rounded'; document.getElementById('electricBtn').className='px-4 py-2 bg-gray-200 rounded'; document.getElementById('magneticBtn').className='px-4 py-2 bg-gray-200 rounded'; startEMWave(); });

    function drawMagnetic(){ clearField(); // simple field around current-carrying wire at center
      const cx = canvas.width/2, cy = canvas.height/2; ctx.beginPath(); for(let r=30;r<200;r+=20){ ctx.arc(cx,cy,r,0,Math.PI*2); ctx.strokeStyle = '#6ee7b7'; ctx.stroke(); } document.getElementById('fieldSample').textContent = 'qual.'; }

    let waveAnim=null; function startEMWave(){ let t=0; waveAnim = setInterval(()=>{ clearField(); for(let x=0;x<canvas.width;x+=6){ const Ey = 30*Math.sin((x/40)+t); ctx.beginPath(); ctx.moveTo(x, canvas.height/2); ctx.lineTo(x, canvas.height/2 - Ey); ctx.strokeStyle='#2563eb'; ctx.stroke(); } t += 0.2; }, 60); }

    // stop any running wave when switching modes
    function stopWave(){ if(waveAnim){ clearInterval(waveAnim); waveAnim=null; } }

    // small helpers
    window.addEventListener('resize', ()=>{ canvas.width = canvas.offsetWidth; canvas.height = 420; drawField(); });

    // navigation & quiz
    document.getElementById('prevBtn').onclick = ()=>{ if(currentStep>0) showStep(currentStep-1); };
    document.getElementById('nextBtn').onclick = ()=>{ if(currentStep < topicData.steps.length-1) { showQuiz(); } };

    function showQuiz(){ const modal = document.getElementById('quizModal'); modal.classList.remove('hidden'); const qc = document.getElementById('quizContent'); qc.innerHTML = topicData.quiz.map((q,i)=>`<div class="mb-4"><p class="font-semibold">${i+1}. ${q.question}</p>${q.options.map((o,oi)=>`<label class="block"><input type="radio" name="q${i}" value="${oi}"> ${o}</label>`).join('')}</div>`).join(''); }
    document.getElementById('closeQuiz').onclick = ()=>{ document.getElementById('quizModal').classList.add('hidden'); };
    document.getElementById('submitQuiz').onclick = ()=>{ let score=0; topicData.quiz.forEach((q,i)=>{ const sel = document.querySelector(`input[name="q${i}"]:checked`); if(sel && parseInt(sel.value)===q.correct) score++; }); const pct = (score/topicData.quiz.length)*100; document.getElementById('quizContent').innerHTML = `<div class="text-center"><p class="font-bold text-2xl">${score}/${topicData.quiz.length}</p><p class="mt-2">${pct>=70?'Well done!':'Try again.'}</p></div>`; };

    // init
    let currentMode='electric'; renderSteps(); showStep(0); canvas.width = canvas.offsetWidth; canvas.height = 420; drawField();
  </script>
<!-- Topic Quiz System -->
<script src="/js/topic-quiz-loader.js"></script>
<script src="/js/topic-quiz-injector.js"></script>
</body>
</html>
