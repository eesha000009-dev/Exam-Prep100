    <style>
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }
        .step-progress { transition: width 0.3s ease-in-out; }
        .resource-card { transition: transform 0.2s; }
        .resource-card:hover { transform: translateY(-4px); }
        .step-button.active { background-color: #EFF6FF; color: #2563EB; }
        .quiz-option.selected { border-color: #2563EB; background-color: #EFF6FF; }
        .quiz-option.correct { border-color: #16A34A; background-color: #F0FDF4; }
        .quiz-option.incorrect { background-color: #fff5f5; border-color: #e53e3e; }
        
        /* Mode switcher styles */
        #modeLearnBtn.active { background-color: #EFF6FF; color: #2563EB; }
        #modeAIBtn { position: relative; cursor: not-allowed; opacity: 0.7; }

        /* Mobile sidebar */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 40;
        }
        .sidebar-overlay.show { display: block; }

        /* Simulation container - larger size */
        .simulation-container {
            position: relative;
            width: 100%;
            height: 800px;
            overflow: hidden;
            border-radius: 8px;
            background: #f9fafb;
        }
        .simulation-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Video container - responsive */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #f9fafb;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .desktop-sidebar { display: none; }
            .mobile-sidebar {
                position: fixed;
                top: 0; left: -280px;
                width: 280px;
                height: 100%;
                background: white;
                z-index: 50;
                transition: left 0.3s ease;
                overflow-y: auto;
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            }
            .mobile-sidebar.show { left: 0; }
            .simulation-container { height: 400px; }
            
            /* Intro text mobile */
            .intro-text {
                padding: 0.875rem 1rem;
                margin-bottom: 1rem;
            }
            .intro-text p {
                font-size: 0.9375rem;
                line-height: 1.5;
            }
            
            /* Section card mobile */
            .section-card {
                padding: 1rem;
                margin-bottom: 1rem;
                border-radius: 8px;
            }
            
            /* Click hint mobile */
            .click-hint {
                font-size: 0.8125rem;
                margin-top: 12px;
                padding: 8px 0;
            }
            .click-hint svg {
                width: 14px;
                height: 14px;
            }
        }

        @media (max-width: 480px) {
            .simulation-container { height: 320px; }
            
            .intro-text {
                padding: 0.75rem;
                margin-bottom: 0.75rem;
                border-radius: 0 6px 6px 0;
            }
            .intro-text p {
                font-size: 0.875rem;
            }
            
            .section-card {
                padding: 0.875rem;
                margin-bottom: 0.875rem;
            }
            
            .click-hint {
                font-size: 0.75rem;
                gap: 4px;
            }
            
            /* Mode switcher on small screens */
            #modeLearnBtn, #modeAIBtn {
                padding: 0.5rem 0.75rem;
                font-size: 0.8125rem;
            }
            #modeLearnBtn i, #modeAIBtn i {
                display: none;
            }
            .coming-soon-badge {
                font-size: 8px;
                padding: 2px 6px;
                margin-left: 4px;
            }
        }

        /* General mobile improvements */
        @media (max-width: 768px) {
            /* Main content padding */
            main {
                padding-top: 4.5rem;
                padding-bottom: 5rem;
            }
            
            /* Step container */
            #stepContainer {
                padding: 1rem;
                margin-bottom: 0.5rem;
            }
            
            /* Resources section */
            #resourcesContainer {
                padding: 1rem;
            }
            #resourcesGrid {
                gap: 0.75rem;
            }
            .resource-card {
                padding: 0.875rem;
            }
            
            /* Bottom navigation */
            .fixed.bottom-0 {
                padding: 0.5rem 0;
            }
            .fixed.bottom-0 button {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
            }
            
            /* Header adjustments */
            nav .text-xl {
                font-size: 1rem;
            }
            
            /* Grid layout mobile */
            .grid.md\:grid-cols-2 {
                gap: 0.75rem;
            }
            
            /* Video container */
            .video-container {
                margin: 0 -0.5rem;
                border-radius: 0;
            }
            
            /* Typography adjustments */
            .section-card h3 {
                font-size: 1rem !important;
                margin-bottom: 0.75rem !important;
            }
            .section-card p {
                font-size: 0.875rem !important;
            }
            .section-card strong {
                font-size: 0.9375rem;
            }
            
            /* States of matter grid */
            .section-card .grid {
                gap: 0.5rem;
            }
            .section-card .grid > div {
                padding: 0.75rem;
            }
            .section-card .grid > div p {
                font-size: 0.8125rem;
            }
            
            /* Lists */
            .section-card ol, .section-card ul {
                padding-left: 1.25rem;
            }
            .section-card li {
                font-size: 0.875rem;
                margin-bottom: 0.5rem;
            }
        }

        /* Coming Soon Badge */
        .coming-soon-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 9999px;
            margin-left: 8px;
            text-transform: uppercase;
            font-weight: 600;
            animation: pulse 2s infinite;
            white-space: nowrap;
            display: inline-block;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Intro text styling */
        .intro-text {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-left: 4px solid #3b82f6;
            padding: 1rem 1.25rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 1.5rem;
        }
        .intro-text p {
            color: #1e40af;
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Continue button */
        .continue-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }
        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        /* Section card */
        .section-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
        }

        /* Click to continue hint - simple gray style */
        .click-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #9ca3af;
            font-size: 0.875rem;
            font-weight: 400;
            cursor: pointer;
            margin-top: 16px;
        }
        .click-hint svg {
            width: 16px;
            height: 16px;
        }

        /* Content area cursor */
        #stepContainer.clickable {
            cursor: pointer;
        }
    </style>
</head>

    <script>

                {
                    id: "definition",

                    type: "note",

                        {
                            intro: "Let's start with a fundamental question: What exactly is matter? This is the foundation of everything we'll learn in this topic.",

                                <div class="section-card">

                                        <i class="fas fa-atom text-blue-500 mr-3"></i>What is Matter?
                                    </h3>
                                    <p class="text-gray-700 leading-relaxed">Matter is anything that has <strong>mass</strong> and <strong>occupies space</strong>. Everything you can see, touch, or feel physically is made of matter. It's built from tiny particles called atoms, and when these atoms bond, they form molecules — the building blocks of everything in the universe.</p>
                                </div>
                            `
                        },
                        {
                            intro: "Great! Now that you understand what matter is, let's explore the four basic states in which matter can exist. Each state has unique characteristics based on how the particles are arranged.",
                            content: `
                                <div class="section-card">
                                    <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                                        <i class="fas fa-layer-group text-blue-500 mr-3"></i>The Four Basic States of Matter
                                    </h3>
                                    <p class="text-gray-700 mb-4">Matter can exist in different states depending on the arrangement and energy of its particles:</p>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div class="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-500">
                                            <strong class="text-blue-600 text-lg">1. Solid</strong>
                                            <p class="text-gray-700 mt-2">Particles are tightly packed and vibrate in place. Cohesive forces are very strong. Examples: ice, rock, metal.</p>
                                        </div>
                                        <div class="bg-cyan-50 p-4 rounded-lg border-l-4 border-cyan-500">
                                            <strong class="text-cyan-600 text-lg">2. Liquid</strong>
                                            <p class="text-gray-700 mt-2">Particles are loosely packed and can slide past one another. Cohesive force is weaker. Examples: water, oil, mercury.</p>
                                        </div>
                                        <div class="bg-gray-100 p-4 rounded-lg border-l-4 border-gray-500">
                                            <strong class="text-gray-600 text-lg">3. Gas</strong>
                                            <p class="text-gray-700 mt-2">Particles are far apart and move freely. Cohesive force is very weak. Examples: air, steam, helium.</p>
                                        </div>
                                        <div class="bg-orange-50 p-4 rounded-lg border-l-4 border-orange-500">
                                            <strong class="text-orange-600 text-lg">4. Plasma</strong>
                                            <p class="text-gray-700 mt-2">A hot, ionized gas where atoms break apart into ions and electrons. Examples: the sun, lightning, neon signs.</p>

                                    </div>
                                </div>

                                <div class="section-card">

                                    </div>

                        {
                            intro: "Before we move on, let's think critically about what we've learned. Here's an interesting question to ponder...",

                                    <p class="text-gray-700">To qualify as matter, something must have mass. Light has no mass. Therefore, <strong>light is not matter</strong>. Instead, light is a form of energy (electromagnetic radiation).</p>

                            e.target.closest('button') ||
                            e.target.closest('a') ||
                            e.target.closest('.click-hint')) {
                            return;
                        }
                        advanceToNextChunk(e);
                    };
                } else {
                    stepContainerEl.classList.remove('clickable');
                    stepContainerEl.onclick = null;
                }
            }
            
            stepContainerEl.innerHTML = html;

            // Render resources
            resourcesGridEl.innerHTML = '';
            if (!showingIntro && step.resources && step.resources.length > 0) {
                step.resources.forEach(res => {
                    const icon = res.type === 'video' ? 'fa-play-circle' : (res.type === 'simulation' ? 'fa-laptop-code' : 'fa-image');
                    const card = document.createElement('div');
                    card.className = 'resource-card bg-gray-50 rounded-lg p-4 cursor-pointer hover:shadow-md';
                    card.innerHTML = `
                        <div class="text-blue-500 mb-3"><i class="fas ${icon} text-2xl"></i></div>
                        <h4 class="font-medium mb-1">${res.title}</h4>
                        <p class="text-sm text-gray-600">${res.description}</p>
                    `;
                    card.onclick = () => openResource(res);
                    resourcesGridEl.appendChild(card);
                });
                document.getElementById('resourcesContainer').style.display = 'block';
            } else {
                document.getElementById('resourcesContainer').style.display = 'none';
            }
            
            updateNavButtons(chunks);
            renderStepsList();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showChunkContent(e) {
            if (e) e.stopPropagation();
            loadStep(currentStepIndex, currentChunkIndex, false);
        }

        function advanceToNextChunk(e) {
            if (e) e.stopPropagation();
            const step = topicData.steps[currentStepIndex];
            const chunks = step.chunks;
            const isLastChunk = currentChunkIndex >= chunks.length - 1;
            
            if (!isLastChunk) {
                loadStep(currentStepIndex, currentChunkIndex + 1, true); // Start with intro
            }
        }

        function updateNavButtons(chunks) {
            const step = topicData.steps[currentStepIndex];
            const totalChunks = chunks ? chunks.length : 1;
            const isLastChunk = currentChunkIndex >= totalChunks - 1;
            const isCompleted = stepsCompleted.includes(step.id);
            
            // Previous button
            prevStepBtn.disabled = currentStepIndex === 0 && currentChunkIndex === 0;
            if (currentChunkIndex > 0) {
                prevStepBtn.innerHTML = '<i class="fas fa-chevron-left mr-2"></i>Previous';
            } else {
                prevStepBtn.innerHTML = '<i class="fas fa-chevron-left mr-2"></i>Previous';
            }
            
            // Next button
            nextStepBtn.disabled = false;
            if (!isLastChunk) {
                nextStepBtn.innerHTML = 'Continue<i class="fas fa-arrow-right ml-2"></i>';
            } else if (currentStepIndex === topicData.steps.length - 1 && isCompleted) {
                nextStepBtn.innerHTML = 'Finish <i class="fas fa-check ml-2"></i>';
            } else if (isCompleted) {
                nextStepBtn.innerHTML = 'Next Topic<i class="fas fa-chevron-right ml-2"></i>';
            } else {
                nextStepBtn.innerHTML = 'Take Quiz<i class="fas fa-question-circle ml-2"></i>';
            }
        }
        
        function openResource(resource) {
            resourceModalTitleEl.textContent = resource.title;
            if (resource.type === 'video') {
                resourceModalContentEl.innerHTML = `<div class="video-container"><iframe src="${resource.url}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
            } else if (resource.type === 'simulation') {
                resourceModalContentEl.innerHTML = `<div class="simulation-container" style="height: 85vh;"><iframe src="${resource.url}"></iframe></div>`;
            } else if (resource.type === 'image') {
                resourceModalContentEl.innerHTML = `<img src="${resource.url}" alt="${resource.title}" class="w-full h-auto rounded-lg">`;
            }
            resourceModalEl.classList.remove('hidden');
        }

        function showQuiz() {
            const step = topicData.steps[currentStepIndex];
            if (!step.quiz) return;

            let optionsHtml = step.quiz.options.map((opt, index) => `
                <label class="quiz-option flex items-center space-x-3 p-3 rounded-lg border hover:bg-gray-50 cursor-pointer">
                    <input type="radio" name="quizOption" value="${index}" class="h-4 w-4 text-blue-600">
                    <span>${opt}</span>
                </label>
            `).join('');

            quizContentEl.innerHTML = `
                <h3 class="text-xl font-semibold mb-4">Knowledge Check: ${step.title}</h3>
                <p class="mb-4">${step.quiz.question}</p>
                <div id="quizOptions" class="space-y-2">${optionsHtml}</div>
                <div id="quizFeedback" class="hidden mt-4"></div>
                <div class="mt-6 flex justify-end">
                    <button id="submitQuizBtn" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">Submit Answer</button>
                    <button id="closeQuizBtn" class="hidden ml-2 px-4 py-2 bg-gray-200 text-gray-800 rounded-lg">Close</button>
                </div>
            `;
            quizModalEl.classList.remove('hidden');

            document.getElementById('submitQuizBtn').addEventListener('click', submitQuiz);
            document.getElementById('closeQuizBtn').addEventListener('click', () => {
                quizModalEl.classList.add('hidden');
                if (stepsCompleted.includes(step.id) && currentStepIndex < topicData.steps.length - 1) {
                    loadStep(currentStepIndex + 1, 0, true); // Start with intro
                }
            });
        }

        function submitQuiz() {
            const step = topicData.steps[currentStepIndex];
            const selectedOption = document.querySelector('input[name="quizOption"]:checked');
            if (!selectedOption) {
                alert('Please select an answer!');
                return;
            }

            const answerIndex = parseInt(selectedOption.value);
            const isCorrect = answerIndex === step.quiz.correct;
            const feedbackEl = document.getElementById('quizFeedback');
            
            document.querySelectorAll('.quiz-option').forEach((opt, index) => {
                opt.classList.remove('selected');
                if (index === step.quiz.correct) opt.classList.add('correct');
                if (index === answerIndex && !isCorrect) opt.classList.add('incorrect');
            });
            
            if (isCorrect) {
                feedbackEl.innerHTML = `<div class="p-4 bg-green-50 text-green-700 rounded-lg"><strong class="font-semibold">✓ Correct!</strong> ${step.quiz.explanation}</div>`;
                if (!stepsCompleted.includes(step.id)) {
                    stepsCompleted.push(step.id);
                }
                updateProgress();
            } else {
                feedbackEl.innerHTML = `<div class="p-4 bg-red-50 text-red-700 rounded-lg"><strong class="font-semibold">✗ Not quite.</strong> ${step.quiz.explanation}</div>`;
            }
            
            feedbackEl.classList.remove('hidden');
            document.getElementById('submitQuizBtn').style.display = 'none';
            document.getElementById('closeQuizBtn').textContent = isCorrect ? 'Continue' : 'Try Again';
            document.getElementById('closeQuizBtn').style.display = 'block';
            updateNavButtons(step.chunks);
        }
        
        function updateProgress() {
            const progress = (stepsCompleted.length / topicData.steps.length) * 100;
            progressBar.style.width = `${progress}%`;
            progressPercent.textContent = `${Math.round(progress)}%`;
            renderStepsList();
        }

        prevStepBtn.addEventListener('click', () => {
            const step = topicData.steps[currentStepIndex];
            
            if (showingIntro && currentChunkIndex > 0) {
                // Go to previous chunk's content (not intro)
                loadStep(currentStepIndex, currentChunkIndex - 1, false);
            } else if (!showingIntro) {
                // Go back to intro of current chunk
                loadStep(currentStepIndex, currentChunkIndex, true);
            } else if (currentStepIndex > 0) {
                // Go to previous step's last chunk content
                const prevStep = topicData.steps[currentStepIndex - 1];
                loadStep(currentStepIndex - 1, prevStep.chunks.length - 1, false);
            }
        });

        nextStepBtn.addEventListener('click', () => {
            const step = topicData.steps[currentStepIndex];
            const chunks = step.chunks;
            const isLastChunk = currentChunkIndex >= chunks.length - 1;
            const isCompleted = stepsCompleted.includes(step.id);
            
            if (showingIntro) {
                // Show content of current chunk
                loadStep(currentStepIndex, currentChunkIndex, false);
            } else if (!isLastChunk) {
                // Go to next chunk's intro
                loadStep(currentStepIndex, currentChunkIndex + 1, true);
            } else if (isCompleted) {
                if (currentStepIndex < topicData.steps.length - 1) {
                    loadStep(currentStepIndex + 1, 0, true);
                } else {
                    alert('🎉 Congratulations! You have completed this topic!');
                }
            } else {
                showQuiz();
            }
        });

        closeResourceModalBtn.addEventListener('click', () => resourceModalEl.classList.add('hidden'));
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                resourceModalEl.classList.add('hidden');
                quizModalEl.classList.add('hidden');
                mobileSidebar.classList.remove('show');
                sidebarOverlay.classList.remove('show');
            }
        });

        // Close modal when clicking outside
        resourceModalEl.addEventListener('click', (e) => {
            if (e.target === resourceModalEl) {
                resourceModalEl.classList.add('hidden');
            }
        });

        quizModalEl.addEventListener('click', (e) => {
            if (e.target === quizModalEl) {
                quizModalEl.classList.add('hidden');
            }
        });

        // Initialize on load
        initializePage();
    </script>
