<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login — Supabase Example</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-6 bg-white rounded shadow">
      <h2 class="text-xl font-bold mb-4">Sign in (Supabase)</h2>
      <label class="block text-sm">Email</label>
      <input id="email" class="w-full border p-2 rounded mb-3" type="email" />
      <label class="block text-sm">Password</label>
      <input id="password" class="w-full border p-2 rounded mb-4" type="password" />
      <button id="loginBtn" class="w-full bg-sky-600 text-white py-2 rounded">Sign in</button>
      <div id="msg" class="mt-3 text-sm text-red-600"></div>
    </div>

    <script type="module">
      import { config } from '../js/config.js';
      import { initSupabase, signIn } from '../js/supabase-client.js';
      const supabase = initSupabase(config.supabase.url, config.supabase.anonKey);

      const loginBtn = document.getElementById('loginBtn');
      const msg = document.getElementById('msg');

      loginBtn.addEventListener('click', async () => {
        msg.textContent = '';
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if (!email || !password) { msg.textContent = 'Fill both fields.'; return; }

        try {
          const res = await signIn(supabase, email, password);
          if (res.error) {
            msg.textContent = res.error.message || 'Sign in failed';
            return;
          }

          const user = res.data?.user;
          msg.style.color = 'green';
          msg.textContent = 'Signed in. Reloading...';
          // In a real app you would redirect to dashboard. For demo we'll reload.
          setTimeout(() => window.location.href = '/students/student-dashboard.html', 600);
        } catch (e) {
          msg.textContent = e.message || 'Unexpected error';
        }
      });
    </script>
  </body>
</html>
